<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ar4" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7a8590"/>
    </marker>
  </defs>
  <rect width="820" height="400" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#33414d">선언 병합 — 빈 인터페이스에 내 리소스를 꽂는다</text>
  <text x="410" y="56" text-anchor="middle" font-size="12.5" fill="#7a8590">같은 이름 interface 를 TypeScript 가 하나로 합쳐준다 (declaration merging)</text>

  <!-- i18next side (empty) -->
  <text x="185" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#7a8590">i18next 가 제공 (빈 채로)</text>
  <rect x="40" y="110" width="290" height="70" rx="10" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.8"/>
  <text x="60" y="140" font-size="12.5" font-family="monospace" fill="#5f6b76">interface</text>
  <text x="60" y="160" font-size="12.5" font-family="monospace" font-weight="700" fill="#33414d">CustomTypeOptions {}</text>

  <!-- our side -->
  <text x="185" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#0d3c75">내가 선언 (모듈 augmentation)</text>
  <rect x="40" y="232" width="290" height="96" rx="10" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="58" y="258" font-size="11.5" font-family="monospace" fill="#0d3c75">declare module 'i18next' {</text>
  <text x="72" y="278" font-size="11.5" font-family="monospace" fill="#0d3c75">interface CustomTypeOptions {</text>
  <text x="86" y="298" font-size="11.5" font-family="monospace" font-weight="700" fill="#0d3c75">resources: typeof en;</text>
  <text x="72" y="318" font-size="11.5" font-family="monospace" fill="#0d3c75">} }</text>

  <!-- merge -->
  <line x1="330" y1="150" x2="430" y2="200" stroke="#7a8590" stroke-width="2" marker-end="url(#ar4)"/>
  <line x1="330" y1="280" x2="430" y2="222" stroke="#7a8590" stroke-width="2" marker-end="url(#ar4)"/>
  <circle cx="410" cy="210" r="22" fill="#fff8e6" stroke="#e0a800" stroke-width="2"/>
  <text x="410" y="217" text-anchor="middle" font-size="20" font-weight="700" fill="#9a6700">+</text>
  <text x="410" y="256" text-anchor="middle" font-size="10.5" fill="#9a6700">TS가 병합</text>

  <!-- result -->
  <text x="620" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">결과 — t의 key가 좁혀짐</text>
  <rect x="470" y="164" width="310" height="92" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="488" y="192" font-size="12" font-family="monospace" fill="#1b5e20">t(key:</text>
  <text x="502" y="212" font-size="11.5" font-family="monospace" font-weight="700" fill="#1b5e20">'user.profile.title'</text>
  <text x="502" y="232" font-size="11.5" font-family="monospace" font-weight="700" fill="#1b5e20">| 'close' | …</text>
  <text x="488" y="250" font-size="12" font-family="monospace" fill="#1b5e20">): string</text>

  <!-- bottom note -->
  <rect x="40" y="352" width="740" height="34" rx="8" fill="#fdecea" stroke="#d64545" stroke-width="1.5"/>
  <text x="410" y="374" text-anchor="middle" font-size="11.5" font-weight="700" fill="#a02020">전역에 그냥 interface 를 쓰면 안 합쳐진다 — 반드시 declare module 'i18next' 로 감싼다</text>
</svg>
