<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif, monospace">
  <defs>
    <marker id="ar3" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7a8590"/>
    </marker>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#33414d">FlattenKeys — 중첩 객체가 점 표기 키 union으로</text>
  <text x="410" y="56" text-anchor="middle" font-size="12.5" fill="#7a8590">값이 객체면 `키.${재귀}`로 파고들고, string이면 키 이름에서 멈춘다</text>

  <!-- tree (left) -->
  <text x="60" y="92" font-size="12" font-weight="700" fill="#7a8590">입력 (중첩)</text>
  <!-- user (obj) -->
  <rect x="60" y="104" width="150" height="34" rx="7" fill="#e3f0ff" stroke="#1565c0" stroke-width="1.8"/>
  <text x="74" y="126" font-size="12.5" font-weight="700" fill="#0d3c75">user</text>
  <text x="150" y="126" font-size="10" fill="#1565c0">객체 → 파고듦</text>
  <!-- name leaf -->
  <line x1="90" y1="138" x2="90" y2="160" stroke="#c7ced4" stroke-width="1.5"/>
  <line x1="90" y1="160" x2="108" y2="160" stroke="#c7ced4" stroke-width="1.5"/>
  <rect x="110" y="146" width="130" height="30" rx="7" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="124" y="166" font-size="12" fill="#1b5e20">name : string</text>
  <!-- addr (obj) -->
  <line x1="90" y1="176" x2="90" y2="196" stroke="#c7ced4" stroke-width="1.5"/>
  <line x1="90" y1="196" x2="108" y2="196" stroke="#c7ced4" stroke-width="1.5"/>
  <rect x="110" y="182" width="130" height="30" rx="7" fill="#e3f0ff" stroke="#1565c0" stroke-width="1.8"/>
  <text x="124" y="202" font-size="12" font-weight="700" fill="#0d3c75">addr</text>
  <text x="196" y="202" font-size="9.5" fill="#1565c0">객체</text>
  <!-- city leaf -->
  <line x1="140" y1="212" x2="140" y2="232" stroke="#c7ced4" stroke-width="1.5"/>
  <line x1="140" y1="232" x2="158" y2="232" stroke="#c7ced4" stroke-width="1.5"/>
  <rect x="160" y="218" width="130" height="30" rx="7" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="174" y="238" font-size="12" fill="#1b5e20">city : string</text>
  <!-- close leaf -->
  <rect x="60" y="262" width="150" height="30" rx="7" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="74" y="282" font-size="12" fill="#1b5e20">close : string</text>

  <!-- arrow -->
  <line x1="330" y1="200" x2="430" y2="200" stroke="#7a8590" stroke-width="2.5" marker-end="url(#ar3)"/>
  <text x="380" y="190" text-anchor="middle" font-size="10.5" fill="#7a8590">[keyof T]</text>
  <text x="380" y="216" text-anchor="middle" font-size="10.5" fill="#7a8590">값 union 추출</text>

  <!-- result (right) -->
  <text x="460" y="92" font-size="12" font-weight="700" fill="#7a8590">결과 (평탄화된 키 union)</text>
  <rect x="460" y="104" width="300" height="44" rx="8" fill="#eff6ff" stroke="#1565c0" stroke-width="1.8"/>
  <text x="476" y="132" font-size="13" font-weight="700" fill="#0d3c75">'user.name'</text>
  <rect x="460" y="156" width="300" height="44" rx="8" fill="#eff6ff" stroke="#1565c0" stroke-width="1.8"/>
  <text x="476" y="184" font-size="13" font-weight="700" fill="#0d3c75">'user.addr.city'</text>
  <rect x="460" y="208" width="300" height="44" rx="8" fill="#eff6ff" stroke="#1565c0" stroke-width="1.8"/>
  <text x="476" y="236" font-size="13" font-weight="700" fill="#0d3c75">'close'</text>
  <text x="610" y="282" text-anchor="middle" font-size="11.5" fill="#7a8590">셋을 | 로 이은 union 이 t()의 key 타입이 된다</text>

  <!-- bottom note -->
  <rect x="60" y="330" width="700" height="52" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="1.5"/>
  <text x="410" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#9a6700">재귀는 leaf(string)에서 멈춘다 → 무한 루프 없음</text>
  <text x="410" y="372" text-anchor="middle" font-size="11" fill="#9a6700">단, 순진한 재귀는 TS2589 → 바깥에 `T extends object ?` 가드 필수</text>
</svg>
