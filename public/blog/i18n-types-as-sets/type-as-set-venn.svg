<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="660" height="410" fill="#ffffff"/>
  <!-- outer set: string -->
  <ellipse cx="330" cy="215" rx="300" ry="155" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="330" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">string  —  모든 문자열의 집합 (넓음)</text>
  <!-- inner set: valid keys -->
  <ellipse cx="330" cy="240" rx="152" ry="98" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="330" y="188" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">유효 키 union (좁음)</text>
  <text x="330" y="248" text-anchor="middle" font-size="13" fill="#166534">'user.title' | 'close' | …</text>
  <!-- dot: valid literal -->
  <circle cx="290" cy="290" r="5" fill="#15803d"/>
  <text x="290" y="312" text-anchor="middle" font-size="12" fill="#15803d">'close' ✅ 통과</text>
  <!-- dot: typo literal, inside string but outside key set -->
  <circle cx="545" cy="120" r="5" fill="#dc2626"/>
  <text x="545" y="106" text-anchor="middle" font-size="12" fill="#dc2626">'user.titel' (오타) ❌</text>
  <circle cx="110" cy="330" r="5" fill="#dc2626"/>
  <text x="110" y="352" text-anchor="middle" font-size="12" fill="#dc2626">'zzz' ❌</text>
  <!-- caption -->
  <text x="330" y="392" text-anchor="middle" font-size="13" fill="#334155">리터럴 하나(점)는 작은 원에 들어가지만, string(큰 원 전체)은 작은 원에 못 들어간다 — 넓은 건 좁은 데로 대입 불가</text>
</svg>
