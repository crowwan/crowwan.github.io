<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">분배 = union 에 .map() → 멤버별 판정 → 다시 union</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" fill="#64748b">Exclude&lt;'a' | 'b' | 'c', 'b'&gt;   =   T extends 'b' ? never : T</text>

  <!-- source union -->
  <rect x="30" y="95" width="120" height="215" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="90" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">'a'|'b'|'c'</text>
  <text x="90" y="160" text-anchor="middle" font-size="15" fill="#334155">'a'</text>
  <text x="90" y="212" text-anchor="middle" font-size="15" fill="#334155">'b'</text>
  <text x="90" y="264" text-anchor="middle" font-size="15" fill="#334155">'c'</text>

  <!-- lane 1: 'a' -->
  <line x1="152" y1="155" x2="250" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="360" y="159" text-anchor="middle" font-size="13" fill="#334155">'a' extends 'b' ?  아니오  →  'a'</text>
  <line x1="470" y1="155" x2="560" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- lane 2: 'b' -->
  <line x1="152" y1="207" x2="250" y2="207" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="360" y="211" text-anchor="middle" font-size="13" fill="#9ca3af">'b' extends 'b' ?  예  →  never  (사라짐)</text>

  <!-- lane 3: 'c' -->
  <line x1="152" y1="259" x2="250" y2="259" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="360" y="263" text-anchor="middle" font-size="13" fill="#334155">'c' extends 'b' ?  아니오  →  'c'</text>
  <line x1="470" y1="259" x2="560" y2="259" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- result union -->
  <rect x="562" y="120" width="128" height="175" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="626" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">결과 union</text>
  <text x="626" y="180" text-anchor="middle" font-size="15" fill="#166534">'a'</text>
  <text x="626" y="215" text-anchor="middle" font-size="14" fill="#9ca3af">| never</text>
  <text x="626" y="250" text-anchor="middle" font-size="15" fill="#166534">| 'c'</text>
  <text x="626" y="283" text-anchor="middle" font-size="12" fill="#15803d">= 'a' | 'c'</text>

  <text x="360" y="352" text-anchor="middle" font-size="12" fill="#64748b">never 를 반환한 멤버('b')는 union 에서 증발한다 — 그래서 분배 + never = 필터</text>
</svg>
