<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">번들의 정체 — 파일 하나 안에 무엇이 들어있나</text>

  <!-- outer file -->
  <rect x="60" y="56" width="600" height="300" rx="14" fill="#0f7a63"/>
  <text x="84" y="86" font-size="14" font-weight="700" font-family="monospace" fill="#ffffff">📦 bundle.[hash].js</text>
  <text x="636" y="86" text-anchor="end" font-size="11.5" fill="#bfe6db">브라우저에겐 그냥 스크립트 하나</text>

  <!-- inner 1: runtime -->
  <rect x="84" y="100" width="552" height="66" rx="10" fill="#e8eefb" stroke="#3b5bce" stroke-width="1.6"/>
  <text x="360" y="126" text-anchor="middle" font-size="13.5" font-weight="700" fill="#26398a">① 번들러 런타임</text>
  <text x="360" y="150" text-anchor="middle" font-size="12" font-family="monospace" fill="#26398a">__webpack_require__ + 모듈 캐시 (cache)</text>

  <!-- inner 2: registry -->
  <rect x="84" y="176" width="552" height="88" rx="10" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="360" y="202" text-anchor="middle" font-size="13.5" font-weight="700" fill="#33414d">② 모듈 레지스트리 — 각 모듈이 '함수'로 감싸짐</text>
  <rect x="150" y="214" width="180" height="38" rx="8" fill="#ffffff" stroke="#9aa4ad" stroke-width="1.3"/>
  <text x="240" y="238" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#5f6b76">0: fn(main.js)</text>
  <rect x="390" y="214" width="180" height="38" rx="8" fill="#ffffff" stroke="#9aa4ad" stroke-width="1.3"/>
  <text x="480" y="238" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#5f6b76">1: fn(math.js)</text>

  <!-- inner 3: boot -->
  <rect x="84" y="274" width="552" height="60" rx="10" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="360" y="299" text-anchor="middle" font-size="13.5" font-weight="700" fill="#166534">③ 엔트리 부팅</text>
  <text x="360" y="322" text-anchor="middle" font-size="12" font-family="monospace" fill="#166534">__webpack_require__(0)</text>

  <!-- footer -->
  <rect x="60" y="368" width="600" height="46" rx="10" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.4"/>
  <text x="360" y="389" text-anchor="middle" font-size="12" fill="#5f6b76">브라우저는 이 파일을 실행만 하면 —</text>
  <text x="360" y="407" text-anchor="middle" font-size="12" fill="#166534">안에서 런타임이 모듈을 순서대로 require · 실행한다 (스코프 격리 · 1회 실행 재현)</text>
</svg>
