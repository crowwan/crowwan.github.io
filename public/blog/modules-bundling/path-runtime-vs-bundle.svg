<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="paG" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#5f6b76"/></marker>
    <marker id="paB" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#3b5bce"/></marker>
  </defs>
  <rect width="880" height="410" fill="#ffffff"/>
  <text x="440" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">모듈을 처리하는 두 경로 — 둘 중 하나만 일어난다</text>
  <line x1="440" y1="58" x2="440" y2="352" stroke="#d7dde3" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- PATH A -->
  <text x="222" y="80" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5f6b76">경로 A · 런타임 로딩 (번들 없음)</text>
  <rect x="72" y="94" width="300" height="48" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="222" y="123" text-anchor="middle" font-size="12" font-family="monospace" fill="#33414d">&lt;script type="module"&gt; / Node .mjs</text>
  <line x1="222" y1="142" x2="222" y2="168" stroke="#5f6b76" stroke-width="2" marker-end="url(#paG)"/>
  <rect x="72" y="172" width="300" height="60" rx="9" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="222" y="197" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">JS 엔진이 3단계 수행</text>
  <text x="222" y="217" text-anchor="middle" font-size="11" fill="#166534">construction → instantiation → evaluation</text>
  <line x1="222" y1="232" x2="222" y2="258" stroke="#5f6b76" stroke-width="2" marker-end="url(#paG)"/>
  <rect x="72" y="262" width="300" height="46" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="222" y="290" text-anchor="middle" font-size="12" fill="#33414d">실제로 fetch · 연결 · 실행이 일어남</text>

  <!-- PATH B -->
  <text x="658" y="80" text-anchor="middle" font-size="13.5" font-weight="700" fill="#26398a">경로 B · 빌드 타임 번들링</text>
  <rect x="508" y="94" width="300" height="48" rx="9" fill="#e8eefb" stroke="#3b5bce" stroke-width="1.6"/>
  <text x="658" y="123" text-anchor="middle" font-size="12.5" font-weight="700" fill="#26398a">Vite / webpack (배포 전)</text>
  <line x1="658" y1="142" x2="658" y2="168" stroke="#3b5bce" stroke-width="2" marker-end="url(#paB)"/>
  <rect x="508" y="172" width="300" height="60" rx="9" fill="#e8eefb" stroke="#3b5bce" stroke-width="1.6"/>
  <text x="658" y="197" text-anchor="middle" font-size="12.5" font-weight="700" fill="#26398a">코드 실행 안 함 · 정적 파싱</text>
  <text x="658" y="217" text-anchor="middle" font-size="11" fill="#26398a">import/export → 그래프</text>
  <line x1="658" y1="232" x2="658" y2="258" stroke="#3b5bce" stroke-width="2" marker-end="url(#paB)"/>
  <rect x="508" y="262" width="300" height="46" rx="9" fill="#0f7a63" stroke="#0f7a63" stroke-width="1.6"/>
  <text x="658" y="290" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">tree-shake + 파일 하나로 합침</text>

  <!-- footer -->
  <rect x="72" y="330" width="736" height="60" rx="10" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.4"/>
  <text x="440" y="356" text-anchor="middle" font-size="12.5" fill="#5f6b76">번들하면 <tspan font-weight="700" fill="#33414d">런타임엔 3단계가 없다</tspan> — 사전 계산이지 중복이 아니다</text>
  <text x="440" y="377" text-anchor="middle" font-size="12" fill="#26398a">빌드 타임에 미리 해두는 이유: 네트워크 왕복 제거 + 빌드 타임에만 가능한 최적화</text>
</svg>
