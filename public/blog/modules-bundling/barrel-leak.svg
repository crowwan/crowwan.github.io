<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="blR" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#d64545"/></marker>
    <marker id="blG" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#9aa4ad"/></marker>
  </defs>
  <rect width="880" height="340" fill="#ffffff"/>
  <text x="440" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">barrel — 하나를 원했는데 전부 끌려온다</text>

  <!-- consumer -->
  <rect x="40" y="128" width="188" height="76" rx="10" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="134" y="153" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">소비자</text>
  <text x="134" y="174" text-anchor="middle" font-size="11" font-family="monospace" fill="#166534">import { Button }</text>
  <text x="134" y="190" text-anchor="middle" font-size="11" font-family="monospace" fill="#166534">from './components'</text>
  <line x1="228" y1="166" x2="292" y2="166" stroke="#9aa4ad" stroke-width="2" marker-end="url(#blG)"/>

  <!-- barrel -->
  <rect x="300" y="132" width="150" height="68" rx="10" fill="#fdecea" stroke="#d64545" stroke-width="1.8"/>
  <text x="375" y="160" text-anchor="middle" font-size="12.5" font-weight="700" fill="#a02020">index.ts</text>
  <text x="375" y="182" text-anchor="middle" font-size="12" font-family="monospace" fill="#a02020">export *</text>
  <line x1="450" y1="150" x2="510" y2="118" stroke="#d64545" stroke-width="2" marker-end="url(#blR)"/>
  <line x1="450" y1="166" x2="510" y2="166" stroke="#d64545" stroke-width="2" marker-end="url(#blR)"/>
  <line x1="450" y1="182" x2="510" y2="214" stroke="#d64545" stroke-width="2" marker-end="url(#blR)"/>

  <!-- modules -->
  <rect x="516" y="92" width="320" height="46" rx="9" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="676" y="120" text-anchor="middle" font-size="12" font-family="monospace" fill="#166534">Button.ts   ✓ 실제 필요</text>
  <rect x="516" y="144" width="320" height="46" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.5"/>
  <text x="676" y="172" text-anchor="middle" font-size="12" font-family="monospace" fill="#5f6b76">Modal.ts</text>
  <rect x="516" y="196" width="320" height="52" rx="9" fill="#fdecea" stroke="#d64545" stroke-width="1.5"/>
  <text x="676" y="218" text-anchor="middle" font-size="12" font-family="monospace" fill="#a02020">Chart.ts</text>
  <text x="676" y="235" text-anchor="middle" font-size="10.5" fill="#a02020">+ 무거운 차트 라이브러리</text>

  <!-- footer -->
  <rect x="40" y="278" width="796" height="46" rx="10" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.3"/>
  <text x="438" y="299" text-anchor="middle" font-size="12" fill="#5f6b76">Button 하나를 원했을 뿐인데 <tspan font-family="monospace" fill="#a02020">export *</tspan> 가 형제 전부를 그래프로 끌어들인다</text>
  <text x="438" y="316" text-anchor="middle" font-size="11.5" fill="#5f6b76">prod tree-shaking이 떨궈줄 수도 있으나, dev(tree-shake 안 함)에선 전부 들어온다</text>
</svg>
