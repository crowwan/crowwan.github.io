<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="dp" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#c07f28"/></marker>
    <marker id="dpg" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#2e7d32"/></marker>
  </defs>
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">Vite — 왜 dev는 번들하지 않고, prod는 번들하나</text>

  <!-- DEV -->
  <rect x="34" y="56" width="392" height="286" rx="12" fill="#fbf7f0" stroke="#c07f28" stroke-width="1.6"/>
  <text x="230" y="84" text-anchor="middle" font-size="13.5" font-weight="700" fill="#8a5210">개발 (dev server) — 번들하지 않는다</text>

  <rect x="58" y="104" width="72" height="120" rx="8" fill="#ffffff" stroke="#c07f28" stroke-width="1.4"/>
  <text x="94" y="138" text-anchor="middle" font-size="11" fill="#8a5210">브라우저</text>
  <text x="94" y="170" text-anchor="middle" font-size="10.5" fill="#a5741f">필요한</text>
  <text x="94" y="185" text-anchor="middle" font-size="10.5" fill="#a5741f">모듈만</text>
  <text x="94" y="200" text-anchor="middle" font-size="10.5" fill="#a5741f">요청</text>

  <rect x="286" y="104" width="118" height="30" rx="6" fill="#fbf1e2" stroke="#c07f28" stroke-width="1.1"/><text x="345" y="123" text-anchor="middle" font-size="11" font-family="monospace" fill="#8a5210">main.js</text>
  <rect x="286" y="142" width="118" height="30" rx="6" fill="#fbf1e2" stroke="#c07f28" stroke-width="1.1"/><text x="345" y="161" text-anchor="middle" font-size="11" font-family="monospace" fill="#8a5210">view.js</text>
  <rect x="286" y="180" width="118" height="30" rx="6" fill="#fbf1e2" stroke="#c07f28" stroke-width="1.1"/><text x="345" y="199" text-anchor="middle" font-size="11" font-family="monospace" fill="#8a5210">utils.js</text>
  <line x1="132" y1="132" x2="284" y2="119" stroke="#c07f28" stroke-width="1.6" marker-end="url(#dp)"/>
  <line x1="132" y1="160" x2="284" y2="157" stroke="#c07f28" stroke-width="1.6" marker-end="url(#dp)"/>
  <line x1="132" y1="188" x2="284" y2="195" stroke="#c07f28" stroke-width="1.6" marker-end="url(#dp)"/>
  <text x="220" y="112" text-anchor="middle" font-size="10" fill="#a5741f">native ESM · on-demand</text>

  <text x="230" y="252" text-anchor="middle" font-size="11.5" fill="#8a5210">소스는 <tspan font-weight="700">변환만</tspan> — 번들·tree-shake 안 함</text>
  <text x="230" y="274" text-anchor="middle" font-size="11.5" fill="#8a5210">의존성만 esbuild로 pre-bundle → <tspan font-family="monospace">.vite</tspan> 캐시</text>
  <text x="230" y="300" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">앱 크기와 무관하게 즉각 시작 · HMR</text>
  <text x="230" y="322" text-anchor="middle" font-size="10.5" fill="#a5741f">캐시가 낡으면 → does not provide an export 유령 에러</text>

  <!-- PROD -->
  <rect x="474" y="56" width="392" height="286" rx="12" fill="#f4faf5" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="670" y="84" text-anchor="middle" font-size="13.5" font-weight="700" fill="#166534">빌드 (production) — 번들한다</text>

  <rect x="498" y="106" width="96" height="28" rx="6" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.1"/><text x="546" y="124" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#166534">main.js</text>
  <rect x="498" y="142" width="96" height="28" rx="6" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.1"/><text x="546" y="160" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#166534">view.js</text>
  <rect x="498" y="178" width="96" height="28" rx="6" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.1"/><text x="546" y="196" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#166534">utils.js</text>

  <rect x="648" y="126" width="86" height="60" rx="8" fill="#2e7d32" stroke="#2e7d32" stroke-width="1.4"/>
  <text x="691" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">번들</text>
  <text x="691" y="170" text-anchor="middle" font-size="9.5" fill="#d7efd8">tree-shake</text>
  <line x1="596" y1="120" x2="646" y2="146" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#dpg)"/>
  <line x1="596" y1="156" x2="646" y2="156" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#dpg)"/>
  <line x1="596" y1="192" x2="646" y2="166" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#dpg)"/>

  <rect x="770" y="130" width="72" height="52" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="1.4"/>
  <text x="806" y="160" text-anchor="middle" font-size="10.5" fill="#166534">브라우저</text>
  <line x1="736" y1="156" x2="768" y2="156" stroke="#2e7d32" stroke-width="1.6" marker-end="url(#dpg)"/>

  <text x="670" y="248" text-anchor="middle" font-size="11.5" fill="#166534">번들 안 하면 nested import = <tspan font-weight="700" fill="#a02020">네트워크 요청 폭포</tspan></text>
  <text x="670" y="274" text-anchor="middle" font-size="11.5" fill="#166534">그래서 prod는 합친다 — tree-shake · 청크 분할 · 압축</text>
  <text x="670" y="300" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">최적화된 산출물</text>

  <!-- footer -->
  <rect x="34" y="356" width="832" height="58" rx="10" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.3"/>
  <text x="450" y="382" text-anchor="middle" font-size="12" fill="#5f6b76">dev와 prod가 <tspan font-weight="700" fill="#33414d">다른 엔진</tspan>(esbuild vs Rollup)이면 → <tspan font-weight="700" fill="#a02020">"dev에선 되는데 prod에선 깨짐"</tspan></text>
  <text x="450" y="402" text-anchor="middle" font-size="12" fill="#0a5745">Vite 8은 dev·prod를 모두 Rolldown 한 엔진으로 통합해 그 간극을 없앤다</text>
</svg>
