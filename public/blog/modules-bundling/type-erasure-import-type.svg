<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="teArr" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#8a92a0"/></marker>
  </defs>
  <rect width="880" height="330" fill="#ffffff"/>
  <text x="440" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">import type — 타입은 소거, 값은 남는다</text>

  <!-- TS source -->
  <rect x="48" y="86" width="360" height="150" rx="12" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.4"/>
  <text x="72" y="112" font-size="12.5" font-weight="700" fill="#33414d">TypeScript (.ts)</text>
  <rect x="70" y="126" width="316" height="42" rx="8" fill="#fdecea" stroke="#d64545" stroke-width="1.3"/>
  <text x="86" y="146" font-size="11.5" font-family="monospace" fill="#a02020">import type { User } from './types'</text>
  <text x="360" y="146" text-anchor="end" font-size="10" fill="#a02020">타입</text>
  <text x="86" y="161" font-size="10" fill="#a02020">↑ type 수식어</text>
  <rect x="70" y="176" width="316" height="42" rx="8" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.3"/>
  <text x="86" y="196" font-size="11.5" font-family="monospace" fill="#166534">import { createUser } from './user'</text>
  <text x="360" y="196" text-anchor="end" font-size="10" fill="#166534">값</text>
  <text x="86" y="211" font-size="10" fill="#166534">↑ 수식어 없음</text>

  <!-- arrow -->
  <line x1="414" y1="160" x2="470" y2="160" stroke="#8a92a0" stroke-width="2" marker-end="url(#teArr)"/>
  <text x="442" y="150" text-anchor="middle" font-size="10.5" fill="#5f6b76">컴파일</text>

  <!-- JS output -->
  <rect x="476" y="86" width="360" height="150" rx="12" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.4"/>
  <text x="500" y="112" font-size="12.5" font-weight="700" fill="#33414d">컴파일된 JavaScript (.js)</text>
  <rect x="498" y="126" width="316" height="42" rx="8" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.3"/>
  <text x="514" y="151" font-size="11.5" font-family="monospace" fill="#166534">import { createUser } from './user'</text>
  <text x="514" y="196" font-size="11.5" font-family="monospace" fill="#9aa4ad" text-decoration="line-through">import { User } ...</text>
  <text x="656" y="196" text-anchor="middle" font-size="11" fill="#5f6b76">→ 완전히 사라짐</text>

  <!-- footer -->
  <rect x="48" y="256" width="788" height="52" rx="10" fill="#fbfcfd" stroke="#d7dde3" stroke-width="1.3"/>
  <text x="442" y="278" text-anchor="middle" font-size="12" fill="#5f6b76">single-file 트랜스파일러는 다른 파일을 안 봐서, <tspan font-weight="700" fill="#33414d">타입인지 값인지 모른다</tspan></text>
  <text x="442" y="296" text-anchor="middle" font-size="11.5" fill="#5f6b76">그래서 명시가 필수 — <tspan font-family="monospace" fill="#166534">type</tspan> 붙은 건 항상 삭제, 안 붙은 건 항상 유지</text>
</svg>
