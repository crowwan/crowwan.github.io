<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arRed" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#d64545"/></marker>
    <marker id="arGrn" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 z" fill="#2e7d32"/></marker>
  </defs>
  <rect width="880" height="380" fill="#ffffff"/>
  <line x1="440" y1="60" x2="440" y2="352" stroke="#d7dde3" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="222" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#a02020">스크립트 — 전역 스코프 공유</text>
  <text x="658" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#15803d">모듈 — 격리 + 명시적 계약</text>

  <!-- LEFT -->
  <rect x="66" y="66" width="148" height="56" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="140" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#33414d">a.js</text>
  <text x="140" y="110" text-anchor="middle" font-size="12" font-family="monospace" fill="#5f6b76">var total</text>
  <rect x="230" y="66" width="148" height="56" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="304" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#33414d">b.js</text>
  <text x="304" y="110" text-anchor="middle" font-size="12" font-family="monospace" fill="#5f6b76">var total</text>
  <line x1="140" y1="122" x2="185" y2="206" stroke="#d64545" stroke-width="2" marker-end="url(#arRed)"/>
  <line x1="304" y1="122" x2="259" y2="206" stroke="#d64545" stroke-width="2" marker-end="url(#arRed)"/>
  <rect x="72" y="208" width="296" height="110" rx="10" fill="#fdecea" stroke="#d64545" stroke-width="2"/>
  <text x="220" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#a02020">🌐 window (하나의 전역)</text>
  <text x="220" y="268" text-anchor="middle" font-size="12.5" fill="#a02020">두 total 이 서로 덮어쓴다</text>
  <text x="220" y="292" text-anchor="middle" font-size="12.5" fill="#a02020">로드 순서 = 의존성 (손으로 관리)</text>

  <!-- RIGHT -->
  <rect x="502" y="66" width="148" height="56" rx="9" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="576" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">a.js</text>
  <text x="576" y="110" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#166534">export total</text>
  <rect x="666" y="66" width="148" height="56" rx="9" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="740" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">b.js</text>
  <text x="740" y="110" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#166534">import {total}</text>
  <line x1="712" y1="122" x2="662" y2="200" stroke="#2e7d32" stroke-width="2" marker-end="url(#arGrn)"/>
  <text x="748" y="165" text-anchor="middle" font-size="11" fill="#2e7d32">이름으로 요청</text>
  <rect x="512" y="208" width="296" height="110" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="660" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">각 파일 = 독립 스코프</text>
  <text x="660" y="268" text-anchor="middle" font-size="12.5" fill="#1b5e20">필요한 것만 이름으로 주고받는 계약</text>
  <text x="660" y="292" text-anchor="middle" font-size="12.5" fill="#2e7d32">충돌·순서 문제가 사라진다</text>
</svg>
