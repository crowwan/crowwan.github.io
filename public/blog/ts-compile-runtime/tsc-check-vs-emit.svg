<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7a8590"/>
    </marker>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#33414d">tsc의 두 기능은 분리된다 — 검사만 떼면 게이트가 된다</text>
  <text x="380" y="56" text-anchor="middle" font-size="12.5" fill="#7a8590">타입 검사와 파일 변환은 반드시 같이 쓸 필요가 없다</text>

  <!-- tsc box -->
  <rect x="310" y="80" width="140" height="46" rx="10" fill="#33414d"/>
  <text x="380" y="109" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">tsc</text>

  <!-- split arrows -->
  <line x1="360" y1="128" x2="200" y2="168" stroke="#7a8590" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="400" y1="128" x2="560" y2="168" stroke="#7a8590" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Left branch: type check -->
  <text x="185" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">① 타입 검사</text>
  <rect x="55" y="200" width="260" height="46" rx="9" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="185" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#0d3c75">tsc --noEmit  (검사만, JS 안 만듦)</text>
  <rect x="55" y="254" width="260" height="46" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="185" y="282" text-anchor="middle" font-size="13" fill="#1e40af">tsserver  (IDE 실시간 빨간 줄)</text>

  <!-- Right branch: emit -->
  <text x="575" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">② 파일 변환 (emit)</text>
  <rect x="445" y="200" width="260" height="46" rx="9" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="575" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">esbuild · swc · babel</text>
  <rect x="445" y="254" width="260" height="46" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="1.5"/>
  <text x="575" y="282" text-anchor="middle" font-size="12.5" fill="#9a6700">→ 타입 검사는 안 함 (그래서 빠름)</text>

  <!-- bottom highlight -->
  <rect x="55" y="336" width="650" height="46" rx="9" fill="#eff6ff" stroke="#1565c0" stroke-width="2"/>
  <text x="380" y="364" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0d3c75">검사만 떼어낸 tsc --noEmit 의 통과 / 실패 = CI 게이트</text>
</svg>
