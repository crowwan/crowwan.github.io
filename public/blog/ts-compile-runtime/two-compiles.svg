<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7a8590"/>
    </marker>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#33414d">"컴파일"이라 불리는 게 사실 두 개다</text>
  <text x="380" y="56" text-anchor="middle" font-size="12.5" fill="#7a8590">① TS→JS 는 빌드 시점 · ② JS→기계어 는 런타임 — 주체도 결과물도 다르다</text>

  <!-- Row 1: build time -->
  <text x="50" y="92" font-size="13.5" font-weight="700" fill="#1565c0">① 빌드 시점</text>
  <rect x="50" y="104" width="150" height="60" rx="10" fill="#ffffff" stroke="#5f6b76" stroke-width="1.5"/>
  <text x="125" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#33414d">.ts 파일</text>
  <text x="125" y="152" text-anchor="middle" font-size="11" fill="#7a8590">타입 있음</text>
  <line x1="204" y1="134" x2="286" y2="134" stroke="#7a8590" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="290" y="104" width="170" height="60" rx="10" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="375" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#0d3c75">tsc · esbuild · swc</text>
  <text x="375" y="150" text-anchor="middle" font-size="10.5" fill="#0d3c75">타입 검사 · 타입 소거 · 변환</text>
  <line x1="464" y1="134" x2="546" y2="134" stroke="#7a8590" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="550" y="104" width="160" height="60" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="630" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">.js 파일</text>
  <text x="630" y="152" text-anchor="middle" font-size="11" fill="#1e40af">결과물 = 소스 파일</text>

  <!-- divider -->
  <line x1="50" y1="200" x2="710" y2="200" stroke="#e5e7eb"/>

  <!-- Row 2: runtime -->
  <text x="50" y="238" font-size="13.5" font-weight="700" fill="#2e7d32">② 런타임(실행 시점)</text>
  <rect x="50" y="250" width="150" height="60" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="125" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">.js 파일</text>
  <line x1="204" y1="280" x2="286" y2="280" stroke="#7a8590" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="290" y="250" width="170" height="60" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="375" y="276" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b5e20">엔진 (V8)</text>
  <text x="375" y="296" text-anchor="middle" font-size="10.5" fill="#1b5e20">인터프리트 + JIT</text>
  <line x1="464" y1="280" x2="546" y2="280" stroke="#7a8590" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="550" y="250" width="160" height="60" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="630" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">기계어</text>
  <text x="630" y="298" text-anchor="middle" font-size="10" fill="#16a34a">메모리에서만 · 파일 아님</text>

  <!-- bottom emphasis -->
  <rect x="50" y="344" width="660" height="40" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="1.5"/>
  <text x="380" y="369" text-anchor="middle" font-size="13" font-weight="700" fill="#9a6700">TS는 실행되지 않는다 — 항상 JS가 된 뒤, JS로 실행된다</text>
</svg>
