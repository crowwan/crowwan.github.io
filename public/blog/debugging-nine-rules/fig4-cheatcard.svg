<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 736" font-family="Pretendard, 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="879" height="735" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="32" y="46" font-size="21" font-weight="700" fill="#0f172a">디버깅 9규칙 — 한눈에</text>

  <!-- Band: 토대 -->
  <text x="32" y="82" font-size="13" font-weight="700" fill="#1e293b">토대</text>
  <rect x="32" y="90" width="816" height="52" rx="9" fill="#1e293b"/>
  <text x="52" y="121" font-size="14.5" font-weight="700" fill="#ffffff">① 시스템 이해</text>
  <text x="212" y="121" font-size="13" fill="#cbd5e1">경계 너머의 동작 계약까지 알아야, 안다고 착각한 지점에 물리지 않는다</text>

  <!-- Band: 오라클 갈래 -->
  <text x="32" y="172" font-size="13" font-weight="700" fill="#1d4ed8">오라클 갈래 — 무엇이 실패인가</text>
  <rect x="32" y="182" width="816" height="52" rx="9" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="52" y="213" font-size="14.5" font-weight="700" fill="#1d4ed8">② 재현</text>
  <text x="212" y="213" font-size="13" fill="#334155">언제든 다시 실패시킬 수 있어야 관찰·좁히기·수정 확인이 된다</text>
  <rect x="32" y="242" width="816" height="52" rx="9" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="52" y="273" font-size="14.5" font-weight="700" fill="#1d4ed8">④ 이분정복</text>
  <text x="212" y="273" font-size="13" fill="#334155">문제 공간을 정상/이상 반쪽으로 갈라 범위를 반씩 좁힌다</text>
  <rect x="32" y="302" width="816" height="52" rx="9" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="52" y="333" font-size="14.5" font-weight="700" fill="#1d4ed8">⑨ 고침 증명</text>
  <text x="212" y="333" font-size="13" fill="#334155">fixed↔broken 순환으로 증명하기 전엔 고친 게 아니다</text>

  <!-- Band: 모델 갈래 -->
  <text x="32" y="384" font-size="13" font-weight="700" fill="#6d28d9">모델 갈래 — 무엇이 연결됐나</text>
  <rect x="32" y="394" width="816" height="52" rx="9" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="52" y="425" font-size="14.5" font-weight="700" fill="#6d28d9">③ 관찰</text>
  <text x="212" y="425" font-size="13" fill="#334155">머리로 원인을 짓지 말고, 실제 실패를 데이터로 눈으로 본다</text>
  <rect x="32" y="454" width="816" height="52" rx="9" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="52" y="485" font-size="14.5" font-weight="700" fill="#6d28d9">⑤ 한 번에 하나</text>
  <text x="212" y="485" font-size="13" fill="#334155">한 변수만 바꾸고 나머지는 고정해야 무엇이 원인인지 안다</text>
  <rect x="32" y="514" width="816" height="52" rx="9" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="52" y="545" font-size="14.5" font-weight="700" fill="#6d28d9">⑥ 기록</text>
  <text x="212" y="545" font-size="13" fill="#334155">무엇을·순서·결과를 적어 기억 오염과 같은 시도 반복을 막는다</text>
  <rect x="32" y="574" width="816" height="52" rx="9" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="52" y="605" font-size="14.5" font-weight="700" fill="#6d28d9">⑦ 기본 전제 확인</text>
  <text x="212" y="605" font-size="13" fill="#334155">배포·환경·캐시 같은 가장 기본적인 가정부터 의심한다</text>
  <rect x="32" y="634" width="816" height="52" rx="9" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="52" y="665" font-size="14.5" font-weight="700" fill="#6d28d9">⑧ 새 시각</text>
  <text x="212" y="665" font-size="13" fill="#334155">증상을 남에게 설명하다 보면 내 편향의 늪에서 빠져나온다</text>

  <text x="440" y="716" text-anchor="middle" font-size="12.5" fill="#475569">①이 토대 — 나머지 여덟은 그 위에서만 성립한다</text>
</svg>
