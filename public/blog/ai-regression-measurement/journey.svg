<svg xmlns="http://www.w3.org/2000/svg" width="660" height="520" viewBox="0 0 660 520" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
<rect width="660" height="520" fill="#0f172a" rx="8"/>
<line x1="34" y1="28" x2="34" y2="438" stroke="#1e293b" stroke-width="2"/>
<circle cx="34" cy="28" r="9" fill="#64748b"/>
<text x="58" y="26" fill="#e2e8f0" font-size="15" font-weight="bold">① 개발 검증 문서 (SDVR/STR)</text>
<text x="58" y="46" fill="#94a3b8" font-size="12.5">기능마다 검증 문서를 작성 — 빡빡한 일정엔 사실상 불가능</text>
<circle cx="34" cy="110" r="9" fill="#64748b"/>
<text x="58" y="108" fill="#e2e8f0" font-size="15" font-weight="bold">② e2e로 명세를 검증</text>
<text x="58" y="128" fill="#94a3b8" font-size="12.5">방향은 옳았지만 테스트 환경·셋업조차 없었다</text>
<circle cx="34" cy="192" r="9" fill="#0891b2"/>
<text x="58" y="190" fill="#e2e8f0" font-size="15" font-weight="bold">③ AI 검증 (Playwright MCP)</text>
<text x="58" y="210" fill="#94a3b8" font-size="12.5">꽤 잘 됐지만 — AI라서 비결정적</text>
<circle cx="34" cy="274" r="9" fill="#64748b"/>
<text x="58" y="272" fill="#e2e8f0" font-size="15" font-weight="bold">④ AI 검증 방식을 문서화</text>
<text x="58" y="292" fill="#94a3b8" font-size="12.5">e2e 코드 대비 시간·토큰 비용이 컸다</text>
<circle cx="34" cy="356" r="9" fill="#0891b2"/>
<text x="58" y="354" fill="#e2e8f0" font-size="15" font-weight="bold">⑤ 격리환경 + e2e</text>
<text x="58" y="374" fill="#94a3b8" font-size="12.5">결정론은 확보 — 그러나 품질등급 미달로 배포 연기</text>
<circle cx="34" cy="438" r="9" fill="#f43f5e"/>
<text x="58" y="436" fill="#e2e8f0" font-size="15" font-weight="bold">⑥ 측정부터 다시 (CFR)</text>
<text x="58" y="456" fill="#94a3b8" font-size="12.5">지금 — 무엇이 새는지부터 보이게 만든다</text>
</svg>