<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#33414d">검증 4층위 — 무엇이 무엇을 잡나</text>
  <text x="410" y="56" text-anchor="middle" font-size="12.5" fill="#7a8590">"TS는 할 수 있는가(can)를, ESLint는 해야 하는가(should)를 강제한다"</text>

  <!-- column headers -->
  <text x="150" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#7a8590">층위</text>
  <text x="410" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#7a8590">잡는 것</text>
  <text x="660" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#7a8590">i18n 예시</text>

  <!-- 타입 -->
  <rect x="40" y="108" width="220" height="60" rx="9" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="150" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#0d3c75">타입 (TS)</text>
  <text x="150" y="154" text-anchor="middle" font-size="10.5" fill="#0d3c75">정적 · 컴파일</text>
  <text x="410" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#33414d">계약 위반</text>
  <text x="410" y="152" text-anchor="middle" font-size="10.5" fill="#7a8590">불가능하게 만든 사용</text>
  <text x="660" y="143" text-anchor="middle" font-size="11" fill="#0d3c75">존재하지 않는 키 = 컴파일 에러 + 자동완성</text>

  <!-- 린트 -->
  <rect x="40" y="176" width="220" height="60" rx="9" fill="#f5f0ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="150" y="202" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">린트 (ESLint)</text>
  <text x="150" y="222" text-anchor="middle" font-size="10.5" fill="#5b21b6">정적 · CI</text>
  <text x="410" y="201" text-anchor="middle" font-size="12" font-weight="700" fill="#33414d">안티패턴</text>
  <text x="410" y="220" text-anchor="middle" font-size="10.5" fill="#7a8590">유효하나 버그 소지</text>
  <text x="660" y="211" text-anchor="middle" font-size="11" fill="#5b21b6">하드코딩된 영어 문자열 (번역 누락)</text>

  <!-- 테스트 -->
  <rect x="40" y="244" width="220" height="60" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="1.8"/>
  <text x="150" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#9a6700">테스트</text>
  <text x="150" y="290" text-anchor="middle" font-size="10.5" fill="#9a6700">동적 · 실행</text>
  <text x="410" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="#33414d">동작</text>
  <text x="410" y="288" text-anchor="middle" font-size="10.5" fill="#7a8590">입력 → 출력</text>
  <text x="660" y="279" text-anchor="middle" font-size="11" fill="#9a6700">복수형 · 보간 렌더 결과</text>

  <!-- 런타임 -->
  <rect x="40" y="312" width="220" height="60" rx="9" fill="#fdecea" stroke="#d64545" stroke-width="1.8"/>
  <text x="150" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#a02020">런타임</text>
  <text x="150" y="358" text-anchor="middle" font-size="10.5" fill="#a02020">동적 · 프로덕션</text>
  <text x="410" y="337" text-anchor="middle" font-size="12" font-weight="700" fill="#33414d">실제 데이터</text>
  <text x="410" y="356" text-anchor="middle" font-size="10.5" fill="#7a8590">정적으로 모를 실입력</text>
  <text x="660" y="347" text-anchor="middle" font-size="11" fill="#a02020">동적 키 · 미로드 리소스</text>

  <!-- static/dynamic axis -->
  <text x="24" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#1565c0" transform="rotate(-90 24 180)">정적(왼쪽 방어선)</text>
  <text x="24" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#d64545" transform="rotate(-90 24 330)">동적(늦은 방어선)</text>

  <rect x="40" y="392" width="765" height="30" rx="8" fill="#eef7ee" stroke="#5aa15e" stroke-width="1.5"/>
  <text x="422" y="411" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">번역 키가 "존재하는가"는 가능/불가능 문제 → 타입의 영역</text>
</svg>
