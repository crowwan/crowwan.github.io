<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#9aa0a6"/>
    </marker>
  </defs>
  <rect width="700" height="380" fill="#ffffff"/>

  <!-- principle -->
  <rect x="210" y="26" width="280" height="62" rx="11" fill="#eef2f6" stroke="#33414d" stroke-width="2.5"/>
  <text x="350" y="54" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2933">동작을 테스트한다</text>
  <text x="350" y="76" text-anchor="middle" font-size="12.5" fill="#5f6b76">단 하나의 원칙</text>

  <!-- branches -->
  <path d="M290,88 C220,120 185,128 180,150" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M410,88 C480,120 515,128 520,150" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- NEW -->
  <rect x="40" y="152" width="280" height="170" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="180" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#1b5e20">신규 코드</text>
  <line x1="70" y1="196" x2="290" y2="196" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="180" y="222" text-anchor="middle" font-size="13.5" fill="#33414d">명세를 <tspan font-weight="700" fill="#1b5e20">안다</tspan></text>
  <text x="180" y="248" text-anchor="middle" font-size="13.5" fill="#33414d">TDD · inside-out</text>
  <text x="180" y="274" text-anchor="middle" font-size="13.5" fill="#33414d">도메인 → 바깥</text>
  <text x="180" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">동작을 선언한다</text>

  <!-- LEGACY -->
  <rect x="380" y="152" width="280" height="170" rx="12" fill="#fff1e6" stroke="#e65100" stroke-width="2"/>
  <text x="520" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#a64200">레거시 코드</text>
  <line x1="410" y1="196" x2="630" y2="196" stroke="#ffcc95" stroke-width="1.5"/>
  <text x="520" y="222" text-anchor="middle" font-size="13.5" fill="#33414d">명세를 <tspan font-weight="700" fill="#a64200">모른다</tspan></text>
  <text x="520" y="248" text-anchor="middle" font-size="13.5" fill="#33414d">characterization · outside-in</text>
  <text x="520" y="274" text-anchor="middle" font-size="13.5" fill="#33414d">바깥(e2e) → 안</text>
  <text x="520" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">동작을 관찰한다</text>

  <text x="350" y="352" text-anchor="middle" font-size="13" fill="#7a8590">다른 건 "명세를 아느냐"뿐 — 원칙은 둘 다 같다</text>
</svg>
