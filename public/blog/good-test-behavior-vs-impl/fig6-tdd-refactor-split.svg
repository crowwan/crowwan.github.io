<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 410" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#9aa0a6"/>
    </marker>
  </defs>
  <rect width="660" height="410" fill="#ffffff"/>

  <!-- REFACTOR -->
  <rect x="180" y="24" width="300" height="64" rx="10" fill="#e3f0ff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="330" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="#0d3c75">🔵 REFACTOR</text>
  <text x="330" y="74" text-anchor="middle" font-size="13" fill="#0d3c75">save() → uow.commit() · 동작은 그대로</text>

  <line x1="330" y1="88" x2="330" y2="118" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- decision -->
  <rect x="210" y="120" width="240" height="50" rx="9" fill="#eef2f6" stroke="#5f6b76" stroke-width="2"/>
  <text x="330" y="151" text-anchor="middle" font-size="15" font-weight="600" fill="#33414d">어떤 테스트인가?</text>

  <!-- branches -->
  <path d="M270,170 C200,205 165,210 160,238" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M390,170 C460,205 495,210 500,238" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Classicist pass -->
  <rect x="30" y="240" width="260" height="120" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="160" y="268" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1b5e20">Classicist</text>
  <text x="160" y="290" text-anchor="middle" font-size="13" fill="#33414d">findById로 결과(상태) 검증</text>
  <text x="160" y="320" text-anchor="middle" font-size="18" font-weight="700" fill="#2e7d32">🟢 통과</text>
  <text x="160" y="343" text-anchor="middle" font-size="12.5" fill="#33414d">리팩토링 자유</text>

  <!-- Mockist fail -->
  <rect x="370" y="240" width="260" height="120" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="500" y="268" text-anchor="middle" font-size="14.5" font-weight="700" fill="#b71c1c">Mockist</text>
  <text x="500" y="290" text-anchor="middle" font-size="13" fill="#33414d">repo.save 호출 검증</text>
  <text x="500" y="320" text-anchor="middle" font-size="18" font-weight="700" fill="#c62828">🔴 빨간불</text>
  <text x="500" y="343" text-anchor="middle" font-size="12.5" fill="#33414d">동작 멀쩡한데 깨짐</text>

  <text x="330" y="392" text-anchor="middle" font-size="13" fill="#7a8590">REFACTOR가 성립하려면 리팩토링 내성이 전제 — mockist는 그 전제를 깬다</text>
</svg>
