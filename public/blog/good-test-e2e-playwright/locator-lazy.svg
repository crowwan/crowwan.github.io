<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="la" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7a8590"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#33414d">Locator는 '요소'가 아니라 '찾는 방법' — 늦게, 매번 찾는다</text>
  <text x="380" y="52" text-anchor="middle" font-size="12.5" fill="#7a8590">선언 시점엔 DOM을 보지 않는다. 동작·평가하는 순간에 비로소 resolve된다.</text>

  <!-- declare -->
  <rect x="40" y="82" width="220" height="60" rx="9" fill="#eef2f6" stroke="#5f6b76" stroke-width="1.5"/>
  <text x="150" y="108" text-anchor="middle" font-size="12.5" font-family="ui-monospace, monospace" fill="#33414d">const btn =</text>
  <text x="150" y="126" text-anchor="middle" font-size="12.5" font-family="ui-monospace, monospace" fill="#33414d">page.getByRole(...)</text>
  <text x="150" y="162" text-anchor="middle" font-size="12" fill="#5f6b76">선언만 — DOM 안 봄</text>

  <line x1="265" y1="112" x2="320" y2="112" stroke="#7a8590" stroke-width="2" marker-end="url(#la)"/>

  <!-- first resolve -->
  <rect x="325" y="82" width="190" height="60" rx="9" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="420" y="108" text-anchor="middle" font-size="12.5" font-family="ui-monospace, monospace" fill="#0d3c75">await btn.click()</text>
  <text x="420" y="126" text-anchor="middle" font-size="11.5" fill="#0d3c75">← 이 순간 DOM에서 찾음</text>
  <text x="420" y="162" text-anchor="middle" font-size="12" fill="#1565c0">resolve</text>

  <line x1="520" y1="112" x2="560" y2="112" stroke="#7a8590" stroke-width="2" marker-end="url(#la)"/>

  <!-- second resolve -->
  <rect x="565" y="82" width="160" height="60" rx="9" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="645" y="108" text-anchor="middle" font-size="12.5" font-family="ui-monospace, monospace" fill="#0d3c75">await btn...</text>
  <text x="645" y="126" text-anchor="middle" font-size="11.5" fill="#0d3c75">← 또 새로 찾음</text>
  <text x="645" y="162" text-anchor="middle" font-size="12" fill="#1565c0">re-resolve</text>

  <rect x="40" y="206" width="685" height="62" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="2"/>
  <text x="60" y="234" font-size="13" font-weight="700" fill="#9a6700">왜 이렇게?</text>
  <text x="60" y="256" font-size="12.5" fill="#5a4a20">늦게·매번 찾기 때문에, Playwright는 그 시점의 DOM을 보고 요소가 준비될 때까지 기다릴 수 있다 — auto-waiting의 토대.</text>
</svg>
