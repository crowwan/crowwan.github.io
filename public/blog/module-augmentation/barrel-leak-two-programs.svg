<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arGrn5" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#2e7d32"/>
    </marker>
    <marker id="arRed5" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#d64545"/>
    </marker>
  </defs>
  <rect width="880" height="470" fill="#ffffff"/>
  <text x="440" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">모노레포 = 프로젝트마다 별개 program — barrel이 경계를 넘나드는 문</text>

  <!-- Program E (lib) -->
  <rect x="40" y="54" width="360" height="180" rx="12" fill="#eef7ee" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="58" y="78" font-size="12.5" font-weight="700" fill="#15803d">Program E — lib (자기 tsconfig)</text>
  <rect x="58" y="90" width="150" height="46" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="133" y="108" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">i18next.d.ts</text>
  <text x="133" y="124" text-anchor="middle" font-size="9.5" fill="#2e7d32">glob으로 편입 ✅</text>
  <rect x="230" y="90" width="150" height="46" rx="7" fill="#ffffff" stroke="#93c79a" stroke-width="1.3"/>
  <text x="305" y="108" text-anchor="middle" font-size="10.5" fill="#33414d">내부 다이얼로그</text>
  <text x="305" y="124" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#2e7d32">t() 세이프</text>
  <rect x="58" y="150" width="322" height="66" rx="8" fill="#ffffff" stroke="#93c79a" stroke-width="1.4"/>
  <text x="70" y="170" font-size="11" font-weight="700" fill="#15803d">index.ts (barrel · 공개 진입점)</text>
  <text x="70" y="190" font-size="10.5" font-family="monospace" fill="#166534">export * from './dialogs'</text>
  <text x="70" y="207" font-size="10.5" font-family="monospace" fill="#8a3b3b">export * from './i18next'  <tspan fill="#a02020">← 하면 누출</tspan></text>

  <!-- Program A (app) -->
  <rect x="480" y="54" width="360" height="180" rx="12" fill="#f7f8fa" stroke="#9aa4ad" stroke-width="1.8"/>
  <text x="498" y="78" font-size="12.5" font-weight="700" fill="#5f6b76">Program A — app (별개 tsconfig)</text>
  <rect x="498" y="90" width="324" height="46" rx="7" fill="#ffffff" stroke="#b7c0c8" stroke-width="1.3"/>
  <text x="510" y="110" font-size="10.5" font-family="monospace" fill="#33414d">import { Dialog } from '@/lib'  // barrel 소비</text>
  <text x="510" y="126" font-size="9.5" fill="#7a8590">app의 glob은 i18next.d.ts를 안 잡음</text>
  <text x="660" y="164" text-anchor="middle" font-size="11" fill="#5f6b76">하나만 import해도 barrel의</text>
  <text x="660" y="182" text-anchor="middle" font-size="11" fill="#5f6b76"><tspan font-family="monospace" fill="#33414d">export *</tspan> 대상 전부가 그래프에 올라옴</text>
  <text x="660" y="208" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5f6b76">→ i18next.d.ts가 끼면 Program A에 편입</text>

  <!-- arrows: two cases -->
  <line x1="380" y1="176" x2="474" y2="112" stroke="#2e7d32" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arGrn5)"/>
  <text x="427" y="132" text-anchor="middle" font-size="9.5" fill="#2e7d32">정상 import</text>

  <!-- CASE isolate -->
  <rect x="40" y="256" width="390" height="150" rx="11" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="235" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">✅ barrel이 i18next.d.ts를 재수출 안 함</text>
  <text x="235" y="308" text-anchor="middle" font-size="11.5" fill="#2e7d32">app의 어느 경로로도 도달 못 함</text>
  <text x="235" y="330" text-anchor="middle" font-size="11.5" fill="#2e7d32">→ Program A에 안 들어옴</text>
  <text x="235" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">app의 i18next는 그대로 — 격리</text>
  <text x="235" y="384" text-anchor="middle" font-size="10.5" fill="#4b7a4f">tsc --listFilesOnly 목록에 그 파일 없음</text>

  <!-- CASE leak -->
  <rect x="450" y="256" width="390" height="150" rx="11" fill="#fdecea" stroke="#d64545" stroke-width="1.8"/>
  <text x="645" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#a02020">💥 barrel이 export * 로 누출</text>
  <text x="645" y="308" text-anchor="middle" font-size="11.5" fill="#a02020">import 그래프로 도달 → Program A에 편입</text>
  <text x="645" y="330" text-anchor="middle" font-size="11.5" fill="#a02020">→ app의 i18next도 lib 키로 augment</text>
  <text x="645" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#a02020">app이 자기 augmentation 있으면 TS2717</text>
  <text x="645" y="384" text-anchor="middle" font-size="11.5" fill="#a02020">없으면 app의 t()가 잘못 좁혀져 TS2345</text>

  <!-- footer -->
  <text x="440" y="440" text-anchor="middle" font-size="12" fill="#5f6b76">규칙 — augmentation .d.ts는 <tspan font-weight="700">자기 lib의 glob에만</tspan> 넣고, <tspan font-weight="700">barrel로 다른 program에 재수출하지 마라</tspan></text>
  <text x="440" y="460" text-anchor="middle" font-size="10.5" fill="#8a94a0">"자기 가방엔 넣되, 이웃에게 건네지 마라"</text>
</svg>
