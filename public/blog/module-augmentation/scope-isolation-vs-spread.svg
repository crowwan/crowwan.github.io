<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arGray4" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7a8590"/>
    </marker>
    <marker id="arBlue4" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#1f6feb"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#ffffff"/>
  <line x1="440" y1="58" x2="440" y2="392" stroke="#d7dde3" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="222" y="34" text-anchor="middle" font-size="16.5" font-weight="700" fill="#5f6b76">일반 선언 — 파일에 갇힌다</text>
  <text x="658" y="34" text-anchor="middle" font-size="16.5" font-weight="700" fill="#1f6feb">augmentation — program 전역</text>

  <!-- LEFT -->
  <rect x="60" y="60" width="150" height="60" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="135" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5f6b76">a.ts</text>
  <text x="135" y="103" text-anchor="middle" font-size="11" font-family="monospace" fill="#33414d">export const x</text>
  <line x1="210" y1="90" x2="264" y2="90" stroke="#7a8590" stroke-width="1.8" marker-end="url(#arGray4)"/>
  <rect x="270" y="60" width="120" height="60" rx="9" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.6"/>
  <text x="330" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5f6b76">b.ts</text>
  <text x="330" y="103" text-anchor="middle" font-size="10.5" font-family="monospace" fill="#33414d">import { x }</text>
  <rect x="60" y="140" width="330" height="120" rx="10" fill="#fafbfc" stroke="#c4ccd3" stroke-width="1.4"/>
  <text x="225" y="162" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5f6b76">c.ts / d.ts (import 안 함)</text>
  <text x="225" y="196" text-anchor="middle" font-size="12" fill="#7a8590">x 를 볼 수 없음</text>
  <text x="225" y="220" text-anchor="middle" font-size="11.5" fill="#7a8590">import한 곳(b)에서만 보인다</text>
  <text x="225" y="244" text-anchor="middle" font-size="11" fill="#9aa4ad">모듈 스코프가 격리 — 다른 파일 안 건드림</text>

  <!-- RIGHT: program box -->
  <rect x="490" y="60" width="330" height="200" rx="12" fill="#eef4fd" stroke="#1f6feb" stroke-width="1.8"/>
  <text x="655" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1f4e79">하나의 program (도달 가능한 파일 집합)</text>
  <rect x="508" y="94" width="130" height="40" rx="7" fill="#dce9fb" stroke="#4a90e2" stroke-width="1.4"/>
  <text x="573" y="112" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1f4e79">i18next.d.ts</text>
  <text x="573" y="127" text-anchor="middle" font-size="9.5" fill="#1f6feb">glob으로 편입</text>
  <rect x="672" y="94" width="130" height="40" rx="7" fill="#ffffff" stroke="#9db8dc" stroke-width="1.3"/>
  <text x="737" y="112" text-anchor="middle" font-size="10.5" fill="#33414d">SettingDialog</text>
  <text x="737" y="127" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#5f6b76">t('...')</text>
  <rect x="508" y="146" width="130" height="40" rx="7" fill="#ffffff" stroke="#9db8dc" stroke-width="1.3"/>
  <text x="573" y="164" text-anchor="middle" font-size="10.5" fill="#33414d">ExportDialog</text>
  <text x="573" y="179" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#5f6b76">t('...')</text>
  <rect x="672" y="146" width="130" height="40" rx="7" fill="#ffffff" stroke="#9db8dc" stroke-width="1.3"/>
  <text x="737" y="164" text-anchor="middle" font-size="10.5" fill="#33414d">shared-lib</text>
  <text x="737" y="179" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#5f6b76">t(변수) 💥</text>
  <line x1="573" y1="134" x2="655" y2="146" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arBlue4)"/>
  <line x1="638" y1="114" x2="668" y2="114" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arBlue4)"/>
  <line x1="573" y1="186" x2="573" y2="146" stroke="#1f6feb" stroke-width="1.2" opacity="0"/>
  <text x="655" y="212" text-anchor="middle" font-size="11.5" fill="#1f4e79">아무도 i18next.d.ts를 import 안 해도</text>
  <text x="655" y="230" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f4e79">program 안 모든 t()에 적용된다</text>
  <text x="655" y="248" text-anchor="middle" font-size="10.5" fill="#4a6fa5">이점(다 세이프)과 부작용(shared-lib까지)이 한 몸</text>

  <!-- footer -->
  <text x="440" y="300" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5f6b76">비대칭 = 이 글의 절정</text>
  <text x="440" y="324" text-anchor="middle" font-size="11.5" fill="#7a8590">일반 선언은 "import해야 보임" / augmentation은 "program에 있기만 하면 전역"</text>
  <text x="440" y="346" text-anchor="middle" font-size="11" fill="#8a94a0">그래서 격리의 단위는 '모듈 스코프'가 아니라 'program' — 다음 그림</text>
</svg>
