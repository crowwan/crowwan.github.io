<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="760" height="430" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#33414d">'통합'은 두 축에서 다른 뜻 — 그래서 MSW가 헷갈린다</text>

  <!-- Axis 1: process boundary -->
  <text x="60" y="92" font-size="13.5" font-weight="700" fill="#33414d">프로세스 경계 축 · Khorikov</text>
  <line x1="220" y1="135" x2="540" y2="135" stroke="#cdd3d9" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="110" x2="380" y2="160" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="380" y="104" text-anchor="middle" font-size="10" fill="#7a8590">프로세스 경계</text>
  <rect x="60" y="108" width="160" height="54" rx="9" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="140" y="131" text-anchor="middle" font-size="14" font-weight="700" fill="#0d3c75">unit</text>
  <text x="140" y="149" text-anchor="middle" font-size="11" fill="#0d3c75">in-process (fake/mock)</text>
  <rect x="540" y="108" width="180" height="54" rx="9" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="630" y="131" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">integration</text>
  <text x="630" y="149" text-anchor="middle" font-size="11" fill="#1b5e20">real DB · network</text>
  <circle cx="300" cy="135" r="9" fill="#ef6c00"/>
  <text x="300" y="186" text-anchor="middle" font-size="12.5" font-weight="700" fill="#e65100">MSW</text>
  <text x="300" y="202" text-anchor="middle" font-size="10.5" fill="#7a8590">real network 안 탐 → unit 쪽</text>

  <!-- Axis 2: sociability -->
  <text x="60" y="252" font-size="13.5" font-weight="700" fill="#33414d">사회성 축 · Dodds</text>
  <line x1="220" y1="295" x2="540" y2="295" stroke="#cdd3d9" stroke-width="8" stroke-linecap="round"/>
  <rect x="60" y="268" width="160" height="54" rx="9" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="140" y="291" text-anchor="middle" font-size="14" font-weight="700" fill="#0d3c75">unit</text>
  <text x="140" y="309" text-anchor="middle" font-size="11" fill="#0d3c75">1개 격리</text>
  <rect x="540" y="268" width="180" height="54" rx="9" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="630" y="291" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">integration</text>
  <text x="630" y="309" text-anchor="middle" font-size="11" fill="#1b5e20">여러 개 함께</text>
  <circle cx="470" cy="295" r="9" fill="#ef6c00"/>
  <text x="470" y="346" text-anchor="middle" font-size="12.5" font-weight="700" fill="#e65100">MSW</text>
  <text x="470" y="362" text-anchor="middle" font-size="10.5" fill="#7a8590">여러 컴포넌트 함께 → integration 쪽</text>

  <!-- bottom note -->
  <rect x="60" y="388" width="640" height="34" rx="8" fill="#f4f3f0" stroke="#e3e3e0" stroke-width="1.5"/>
  <text x="380" y="410" text-anchor="middle" font-size="12" fill="#33414d">같은 MSW 테스트가 축에 따라 unit도 integration도 된다 → 라벨 대신 '무엇이 real / 경계 mock'을 명시</text>
</svg>
