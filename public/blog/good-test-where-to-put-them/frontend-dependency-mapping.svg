<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#9aa0a6"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#ef6c00"/>
    </marker>
  </defs>
  <rect width="760" height="470" fill="#ffffff"/>

  <!-- title -->
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#33414d">프론트 의존성 매핑 — '나가는 unmanaged'가 둘로 갈린다</text>
  <text x="380" y="56" text-anchor="middle" font-size="12.5" fill="#7a8590">managed는 화면(output) 검증 / unmanaged ①mutation은 화면으로 돌아오고, ②analytics만 메시지를 검증</text>

  <!-- SUT center -->
  <rect x="300" y="200" width="160" height="64" rx="10" fill="#eef2f6" stroke="#5f6b76" stroke-width="2.5"/>
  <text x="380" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#33414d">SUT = 컴포넌트</text>

  <!-- In (left) -->
  <rect x="30" y="200" width="185" height="64" rx="10" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="122" y="228" text-anchor="middle" font-size="14.5" font-weight="600" fill="#0d3c75">들어오는 입력</text>
  <text x="122" y="248" text-anchor="middle" font-size="12.5" fill="#0d3c75">GET 데이터 · props</text>
  <line x1="215" y1="232" x2="296" y2="232" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="255" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">stub / props</text>
  <text x="255" y="255" text-anchor="middle" font-size="11" fill="#7a8590">검증 X</text>

  <!-- managed (bottom) = 화면 -->
  <rect x="290" y="372" width="180" height="64" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="380" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">나가는 managed = 화면</text>
  <text x="380" y="420" text-anchor="middle" font-size="12" fill="#1b5e20">렌더 결과(output)</text>
  <line x1="380" y1="264" x2="380" y2="368" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="392" y="312" font-size="12" font-weight="600" fill="#2e7d32">real 렌더</text>
  <text x="392" y="330" font-size="11" fill="#7a8590">output 검증</text>

  <!-- unmanaged ① mutation (right top) -->
  <rect x="545" y="104" width="200" height="74" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="645" y="129" text-anchor="middle" font-size="13.5" font-weight="700" fill="#e65100">나가는 unmanaged ①</text>
  <text x="645" y="149" text-anchor="middle" font-size="12" fill="#e65100">백엔드 mutation (POST)</text>
  <text x="645" y="167" text-anchor="middle" font-size="11.5" font-weight="600" fill="#bf4e00">→ 화면 결과로 검증</text>
  <path d="M462,212 C505,190 515,180 542,160" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ① 결과가 화면으로 돌아옴 (dashed back to managed) -->
  <path d="M620,178 C610,290 540,360 472,392" fill="none" stroke="#ef6c00" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrO)"/>
  <text x="600" y="300" font-size="12" font-weight="700" fill="#e65100">결과가 화면으로 ↩</text>
  <text x="600" y="318" font-size="11" fill="#bf4e00">나간 body 직접 검증 ✗</text>

  <!-- unmanaged ② analytics (right bottom) -->
  <rect x="545" y="250" width="200" height="74" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="645" y="275" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b71c1c">나가는 unmanaged ②</text>
  <text x="645" y="295" text-anchor="middle" font-size="12" fill="#b71c1c">analytics · 3rd-party SDK</text>
  <text x="645" y="313" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8e1a16">→ 나간 메시지 검증</text>
  <path d="M462,252 C505,268 515,278 542,286" fill="none" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="505" y="268" text-anchor="middle" font-size="11" fill="#7a8590">화면 흔적 X</text>
</svg>
