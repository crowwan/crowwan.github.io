<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1a2233" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b6bcc7"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e06b6b" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#e06b6b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="720" height="360" rx="20" fill="#f7f8fa"/>

  <!-- ============ Card A ============ -->
  <rect x="24" y="26" width="320" height="308" rx="16" fill="#fff" stroke="#edeef2" filter="url(#sh)"/>
  <rect x="44" y="46" width="26" height="26" rx="8" fill="#e9f0f8"/>
  <text x="57" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#4a78a8">A</text>
  <text x="82" y="58" font-size="14.5" font-weight="700" fill="#232733" letter-spacing="-0.2">coincident z-fight</text>
  <text x="82" y="76" font-size="11.5" fill="#717784">두 mesh가 같은 표면 → depth 동일</text>

  <!-- viewpoint -->
  <g transform="translate(70,250)">
    <rect x="-15" y="-9" width="30" height="18" rx="5" fill="#fff" stroke="#aab0bb" stroke-width="1.5"/>
    <rect x="-6" y="-13" width="11" height="5" rx="2" fill="#fff" stroke="#aab0bb" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#eef1f5" stroke="#aab0bb" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.3" fill="#aab0bb"/>
  </g>
  <line x1="58" y1="296" x2="320" y2="296" stroke="#cdd2db" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="300" y="288" font-size="10.5" fill="#aab0bb">depth</text>

  <!-- coincident surfaces -->
  <ellipse cx="201" cy="186" rx="26" ry="64" fill="url(#glow)"/>
  <path d="M200,118 C212,160 190,212 200,258" fill="none" stroke="#6f93bb" stroke-width="5" stroke-linecap="round"/>
  <path d="M204,118 C216,160 194,212 204,258" fill="none" stroke="#e3a857" stroke-width="5" stroke-linecap="round"/>
  <text x="150" y="120" font-size="10.5" font-weight="600" fill="#6f93bb">스캔</text>
  <text x="214" y="120" font-size="10.5" font-weight="600" fill="#c98a2f">모델</text>
  <g fill="#dd5b5b">
    <circle cx="202" cy="134" r="2.3"/><circle cx="199" cy="150" r="2.3"/>
    <circle cx="204" cy="166" r="2.3"/><circle cx="200" cy="184" r="2.3"/>
    <circle cx="203" cy="204" r="2.3"/><circle cx="199" cy="226" r="2.3"/>
  </g>
  <text x="150" y="278" font-size="11" fill="#717784">depth 동일 → 승자 없이 깜빡임</text>

  <!-- ============ Card B ============ -->
  <rect x="376" y="26" width="320" height="308" rx="16" fill="#fff" stroke="#edeef2" filter="url(#sh)"/>
  <rect x="396" y="46" width="26" height="26" rx="8" fill="#fbf1e3"/>
  <text x="409" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#c98a2f">B</text>
  <text x="434" y="58" font-size="14.5" font-weight="700" fill="#232733" letter-spacing="-0.2">self z-fight</text>
  <text x="434" y="76" font-size="11.5" fill="#717784">한 mesh의 바깥·안쪽 면이 같은 depth</text>

  <g transform="translate(420,250)">
    <rect x="-15" y="-9" width="30" height="18" rx="5" fill="#fff" stroke="#aab0bb" stroke-width="1.5"/>
    <rect x="-6" y="-13" width="11" height="5" rx="2" fill="#fff" stroke="#aab0bb" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#eef1f5" stroke="#aab0bb" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2.3" fill="#aab0bb"/>
  </g>
  <line x1="408" y1="296" x2="670" y2="296" stroke="#cdd2db" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="650" y="288" font-size="10.5" fill="#aab0bb">depth</text>

  <!-- prosthesis cross-section -->
  <path d="M556,110 A54,80 0 0 0 556,270" fill="none" stroke="#e3a857" stroke-width="5" stroke-linecap="round"/>
  <path d="M556,110 A54,80 0 0 1 556,270" fill="none" stroke="#cfa472" stroke-width="3.5" stroke-dasharray="2 6" stroke-linecap="round"/>
  <text x="470" y="194" font-size="10.5" font-weight="600" fill="#c98a2f">바깥</text>
  <text x="588" y="194" font-size="10.5" font-weight="600" fill="#b39163">안쪽</text>
  <circle cx="556" cy="110" r="5" fill="#9296a0"/>
  <circle cx="556" cy="270" r="5" fill="#9296a0"/>
  <text x="450" y="306" font-size="11" fill="#717784">grazing 가장자리에서 두 면 충돌 = 회색 선</text>
</svg>
