<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="system-ui,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1a2233" flood-opacity="0.08"/>
    </filter>
    <clipPath id="cl"><rect x="40" y="78" width="270" height="174" rx="12"/></clipPath>
    <radialGradient id="vig" cx="50%" cy="42%" r="75%">
      <stop offset="70%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="720" height="300" rx="20" fill="#f7f8fa"/>

  <!-- ===== BEFORE ===== -->
  <circle cx="52" cy="44" r="5" fill="#dd5b5b"/>
  <text x="64" y="48" font-size="14" font-weight="700" fill="#232733" letter-spacing="-0.2">Before — z-fighting</text>
  <text x="40" y="68" font-size="11.5" fill="#717784">스캔이 모델 위 무작위 픽셀에 비쳐 깜빡인다</text>

  <g filter="url(#sh)">
    <g clip-path="url(#cl)">
      <rect x="40" y="78" width="270" height="174" fill="#e3a857"/>
      <g fill="#7f9fc1">
        <rect x="70"  y="100" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.42s" begin="-0.05s" repeatCount="indefinite"/></rect>
        <rect x="120" y="94"  width="14" height="14" rx="3"><animate attributeName="opacity" values=".95;0;.95;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.50s" begin="-0.20s" repeatCount="indefinite"/></rect>
        <rect x="176" y="114" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.37s" begin="-0.11s" repeatCount="indefinite"/></rect>
        <rect x="232" y="98"  width="14" height="14" rx="3"><animate attributeName="opacity" values=".95;0;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.46s" begin="-0.30s" repeatCount="indefinite"/></rect>
        <rect x="278" y="124" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;.95;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.54s" begin="-0.08s" repeatCount="indefinite"/></rect>
        <rect x="92"  y="148" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.40s" begin="-0.24s" repeatCount="indefinite"/></rect>
        <rect x="148" y="158" width="14" height="14" rx="3"><animate attributeName="opacity" values=".95;0;.95;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.48s" begin="-0.14s" repeatCount="indefinite"/></rect>
        <rect x="204" y="146" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;0;.95;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.35s" begin="-0.02s" repeatCount="indefinite"/></rect>
        <rect x="258" y="166" width="14" height="14" rx="3"><animate attributeName="opacity" values=".95;0;.95;0;0" keyTimes="0;.25;.5;.75;1" dur="0.52s" begin="-0.27s" repeatCount="indefinite"/></rect>
        <rect x="76"  y="196" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.44s" begin="-0.17s" repeatCount="indefinite"/></rect>
        <rect x="132" y="206" width="14" height="14" rx="3"><animate attributeName="opacity" values=".95;0;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.39s" begin="-0.06s" repeatCount="indefinite"/></rect>
        <rect x="188" y="198" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;.95;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.50s" begin="-0.22s" repeatCount="indefinite"/></rect>
        <rect x="244" y="210" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;0;.95;0" keyTimes="0;.25;.5;.75;1" dur="0.36s" begin="-0.12s" repeatCount="indefinite"/></rect>
        <rect x="106" y="120" width="14" height="14" rx="3"><animate attributeName="opacity" values=".95;0;.95;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.47s" begin="-0.31s" repeatCount="indefinite"/></rect>
        <rect x="210" y="120" width="14" height="14" rx="3"><animate attributeName="opacity" values="0;.95;0;0;.95" keyTimes="0;.25;.5;.75;1" dur="0.41s" begin="-0.09s" repeatCount="indefinite"/></rect>
      </g>
      <rect x="40" y="78" width="270" height="174" fill="url(#vig)"/>
    </g>
  </g>

  <!-- center transition -->
  <g transform="translate(360,165)">
    <circle cx="0" cy="0" r="20" fill="#fff" stroke="#edeef2" filter="url(#sh)"/>
    <path d="M-7,0 L6,0 M1,-5 L7,0 L1,5" fill="none" stroke="#9296a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="40" text-anchor="middle" font-size="10.5" fill="#717784">gl_FragDepth</text>
  </g>

  <!-- ===== AFTER ===== -->
  <circle cx="412" cy="44" r="5" fill="#2f9e74"/>
  <text x="424" y="48" font-size="14" font-weight="700" fill="#232733" letter-spacing="-0.2">After</text>
  <text x="410" y="68" font-size="11.5" fill="#717784">depth를 셰이더에서 분리 → 모델 일관 우선</text>
  <g filter="url(#sh)">
    <rect x="410" y="78" width="270" height="174" rx="12" fill="#e3a857"/>
    <rect x="410" y="78" width="270" height="174" rx="12" fill="url(#vig)"/>
  </g>
  <g transform="translate(545,165)">
    <rect x="-42" y="-13" width="84" height="26" rx="13" fill="#ffffff" opacity="0.92"/>
    <text x="0" y="5" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1d7d52">flicker 0</text>
  </g>
</svg>
