<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="system-ui,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#1a2233" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b6bcc7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="380" rx="20" fill="#f7f8fa"/>

  <!-- formula -->
  <text x="360" y="58" text-anchor="middle" font-size="27" font-weight="700" fill="#232733" letter-spacing="-0.3">
    offset = <tspan fill="#4a78a8">factor·m</tspan> <tspan fill="#aab0bb">+</tspan> <tspan fill="#c98a2f">r·units</tspan>
  </text>
  <rect x="243" y="70" width="76" height="3" rx="1.5" fill="#4a78a8"/>
  <rect x="388" y="70" width="78" height="3" rx="1.5" fill="#c98a2f"/>
  <text x="281" y="90" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4a78a8">기울기 항 · grazing</text>
  <text x="427" y="90" text-anchor="middle" font-size="11.5" font-weight="600" fill="#c98a2f">상수 항 · 정면</text>

  <!-- ===== Left: head-on ===== -->
  <rect x="40" y="110" width="300" height="206" rx="14" fill="#fff" stroke="#edeef2" filter="url(#sh)"/>
  <text x="64" y="140" font-size="14" font-weight="700" fill="#232733">정면 (head-on)</text>
  <g stroke="#eef0f3" stroke-width="1">
    <line x1="80" y1="200" x2="312" y2="200"/><line x1="80" y1="230" x2="312" y2="230"/><line x1="80" y1="260" x2="312" y2="260"/>
  </g>
  <line x1="80" y1="290" x2="312" y2="290" stroke="#cdd2db" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="80" y1="290" x2="80" y2="170" stroke="#cdd2db" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="296" y="306" font-size="10" fill="#aab0bb">화면 x</text>
  <text x="80" y="162" font-size="10" fill="#aab0bb" text-anchor="middle">depth</text>
  <line x1="104" y1="222" x2="296" y2="222" stroke="#4a78a8" stroke-width="4" stroke-linecap="round"/>
  <line x1="104" y1="236" x2="296" y2="236" stroke="#cdd2db" stroke-width="2" stroke-dasharray="3 4"/>
  <line x1="200" y1="222" x2="200" y2="236" stroke="#c98a2f" stroke-width="3.5"/>
  <text x="210" y="234" font-size="10.5" fill="#c98a2f" font-weight="600">상수 offset</text>
  <text x="104" y="276" font-size="11" fill="#717784">m ≈ 0 → <tspan fill="#c98a2f" font-weight="600">상수 항이 분리</tspan></text>

  <!-- ===== Right: grazing ===== -->
  <rect x="380" y="110" width="300" height="206" rx="14" fill="#fff" stroke="#edeef2" filter="url(#sh)"/>
  <text x="404" y="140" font-size="14" font-weight="700" fill="#232733">grazing (비스듬)</text>
  <g stroke="#eef0f3" stroke-width="1">
    <line x1="420" y1="200" x2="652" y2="200"/><line x1="420" y1="230" x2="652" y2="230"/><line x1="420" y1="260" x2="652" y2="260"/>
  </g>
  <line x1="420" y1="290" x2="652" y2="290" stroke="#cdd2db" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="420" y1="290" x2="420" y2="170" stroke="#cdd2db" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="636" y="306" font-size="10" fill="#aab0bb">화면 x</text>
  <text x="420" y="162" font-size="10" fill="#aab0bb" text-anchor="middle">depth</text>
  <line x1="440" y1="278" x2="632" y2="186" stroke="#4a78a8" stroke-width="4" stroke-linecap="round"/>
  <line x1="540" y1="230" x2="600" y2="230" stroke="#aab0bb" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="600" y1="230" x2="600" y2="201" stroke="#aab0bb" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="606" y="220" font-size="9.5" fill="#9296a0">Δdepth</text>
  <text x="440" y="276" font-size="11" fill="#717784">m 큼 → <tspan fill="#4a78a8" font-weight="600">기울기 항만으로 분리</tspan></text>

  <!-- footnote callout -->
  <rect x="96" y="336" width="528" height="34" rx="10" fill="#fbf1e3"/>
  <text x="360" y="357" text-anchor="middle" font-size="12" fill="#7a5a1e">
    우리 fix: <tspan font-weight="700">상수 항(units) = 0</tspan> — z-fight는 줌·회전(grazing)에서 터지고, 거기선 기울기 항이 알아서 최대가 된다
  </text>
</svg>
