<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1a2233" flood-opacity="0.10"/>
    </filter>
    <marker id="rd" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d9534f"/></marker>
    <marker id="gn" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f9e74"/></marker>
  </defs>

  <rect x="0" y="0" width="720" height="360" rx="20" fill="#f7f8fa"/>

  <!-- ===== Left card : BAD ===== -->
  <rect x="24" y="26" width="320" height="308" rx="16" fill="#fff" stroke="#edeef2"/>
  <circle cx="48" cy="58" r="9" fill="#fbecea"/>
  <text x="48" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#d9534f">✗</text>
  <text x="66" y="62" font-size="14.5" font-weight="700" fill="#232733" letter-spacing="-0.2">모델을 앞으로</text>

  <!-- layers -->
  <g filter="url(#sh)">
    <rect x="140" y="120" width="30" height="120" rx="6" fill="#e3a857"/>
    <rect x="180" y="130" width="22" height="100" rx="6" fill="#eccb87"/>
    <rect x="210" y="120" width="30" height="120" rx="6" fill="#cfa472"/>
    <rect x="270" y="128" width="26" height="104" rx="6" fill="#7f9fc1"/>
  </g>
  <!-- ghost of moved base overlapping prosthesis -->
  <rect x="150" y="120" width="30" height="120" rx="6" fill="none" stroke="#d9534f" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="216" y1="104" x2="166" y2="104" stroke="#d9534f" stroke-width="2.4" marker-end="url(#rd)"/>
  <text x="184" y="96" font-size="10.5" fill="#d9534f" font-weight="600">전진</text>
  <!-- collision pill -->
  <g transform="translate(118,260)">
    <rect x="0" y="0" width="128" height="24" rx="12" fill="#fbecea"/>
    <text x="64" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">✗ 보철물 뚫고 나옴</text>
  </g>
  <!-- legend -->
  <g font-size="10" fill="#717784">
    <circle cx="142" cy="304" r="5" fill="#e3a857"/><text x="151" y="308">보철</text>
    <circle cx="190" cy="304" r="5" fill="#eccb87"/><text x="199" y="308">마진</text>
    <circle cx="240" cy="304" r="5" fill="#cfa472"/><text x="249" y="308">베이스</text>
    <circle cx="300" cy="304" r="5" fill="#7f9fc1"/><text x="309" y="308">스캔</text>
  </g>

  <!-- ===== Right card : GOOD ===== -->
  <rect x="376" y="26" width="320" height="308" rx="16" fill="#fff" stroke="#edeef2"/>
  <circle cx="400" cy="58" r="9" fill="#e7f5ef"/>
  <text x="400" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#2f9e74">✓</text>
  <text x="418" y="62" font-size="14.5" font-weight="700" fill="#232733" letter-spacing="-0.2">스캔을 뒤로</text>

  <g filter="url(#sh)">
    <rect x="492" y="120" width="30" height="120" rx="6" fill="#e3a857"/>
    <rect x="532" y="130" width="22" height="100" rx="6" fill="#eccb87"/>
    <rect x="562" y="120" width="30" height="120" rx="6" fill="#cfa472"/>
    <rect x="624" y="128" width="26" height="104" rx="6" fill="#7f9fc1"/>
  </g>
  <!-- lock on base -->
  <g transform="translate(577,150)">
    <rect x="-7" y="-2" width="14" height="11" rx="2.5" fill="#fff" stroke="#9aa3b0" stroke-width="1.4"/>
    <path d="M-4,-2 a4,4 0 0 1 8,0" fill="none" stroke="#9aa3b0" stroke-width="1.5"/>
  </g>
  <!-- scan back arrow -->
  <line x1="640" y1="104" x2="666" y2="104" stroke="#2f9e74" stroke-width="2.4" marker-end="url(#gn)"/>
  <text x="600" y="96" font-size="10.5" fill="#2f9e74" font-weight="600">+offset 뒤로</text>
  <!-- prosthesis self badge -->
  <text x="507" y="112" font-size="12" fill="#2f9e74">↻</text>
  <g transform="translate(484,260)">
    <rect x="0" y="0" width="128" height="24" rx="12" fill="#e7f5ef"/>
    <text x="64" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#1d7d52">✓ layering 보존 · 깨끗</text>
  </g>
  <g font-size="10" fill="#717784">
    <circle cx="494" cy="304" r="5" fill="#e3a857"/><text x="503" y="308">보철</text>
    <circle cx="542" cy="304" r="5" fill="#eccb87"/><text x="551" y="308">마진</text>
    <circle cx="592" cy="304" r="5" fill="#cfa472"/><text x="601" y="308">베이스</text>
    <circle cx="652" cy="304" r="5" fill="#7f9fc1"/><text x="661" y="308">스캔</text>
  </g>
</svg>
