<svg xmlns="http://www.w3.org/2000/svg" width="660" height="560" viewBox="0 0 660 560" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
<rect width="660" height="560" fill="#f6f3ec" rx="8"/>
<text x="36" y="38" fill="#2a2620" font-size="15.5" font-weight="600">회귀를 잡으려 한 시도들</text>
<line x1="36" y1="54" x2="624" y2="54" stroke="#ddd5c4" stroke-width="1"/>
<line x1="48" y1="96" x2="48" y2="496" stroke="#e0d8c7" stroke-width="2"/>

<circle cx="48" cy="96" r="8" fill="#b8b0a1"/>
<text x="72" y="93" fill="#2a2620" font-size="14.5" font-weight="600">① 개발 검증 문서</text>
<text x="72" y="114" fill="#938b7b" font-size="12.5">기능마다 검증 문서를 남긴다 — 빡빡한 일정엔 사실상 불가능</text>

<circle cx="48" cy="176" r="8" fill="#b8b0a1"/>
<text x="72" y="173" fill="#2a2620" font-size="14.5" font-weight="600">② e2e로 명세를 검증</text>
<text x="72" y="194" fill="#938b7b" font-size="12.5">방향은 옳았지만 테스트 환경·셋업조차 없었다</text>

<circle cx="48" cy="256" r="8" fill="#5f7355"/>
<text x="72" y="253" fill="#2a2620" font-size="14.5" font-weight="600">③ AI가 직접 검증 (브라우저 자동화)</text>
<text x="72" y="274" fill="#938b7b" font-size="12.5">꽤 잘 찾았지만 — AI라서 비결정적</text>

<circle cx="48" cy="336" r="8" fill="#b8b0a1"/>
<text x="72" y="333" fill="#2a2620" font-size="14.5" font-weight="600">④ AI 검증 절차를 박제</text>
<text x="72" y="354" fill="#938b7b" font-size="12.5">e2e 코드 대비 시간·토큰 비용이 컸다</text>

<circle cx="48" cy="416" r="8" fill="#5f7355"/>
<text x="72" y="413" fill="#2a2620" font-size="14.5" font-weight="600">⑤ 격리환경 + e2e</text>
<text x="72" y="434" fill="#938b7b" font-size="12.5">결정론은 확보 — 그러나 품질등급 미달로 배포 연기</text>

<circle cx="48" cy="496" r="9" fill="#b35a38"/>
<text x="74" y="493" fill="#b35a38" font-size="14.5" font-weight="700">⑥ 측정부터 다시 (CFR)</text>
<text x="74" y="514" fill="#938b7b" font-size="12.5">지금 — 무엇이 새는지부터 보이게 만든다</text>
</svg>
