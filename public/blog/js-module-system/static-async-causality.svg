<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arC" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#8a94a0"/>
    </marker>
  </defs>
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#33414d">인과의 방향 — 목표 → 설계 → 결과</text>

  <!-- top chain -->
  <rect x="24" y="60" width="180" height="60" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="114" y="86" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4338ca">비동기 로딩 필요</text>
  <text x="114" y="106" text-anchor="middle" font-size="11" fill="#6366f1">(브라우저 · 목표)</text>

  <rect x="244" y="60" width="190" height="60" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="339" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">실행 전에 의존성을</text>
  <text x="339" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">다 알아야 한다</text>

  <rect x="474" y="60" width="180" height="60" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.4"/>
  <text x="564" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">정적 구조 채택</text>
  <text x="564" y="106" text-anchor="middle" font-size="11" fill="#2e7d32">(메커니즘)</text>

  <line x1="204" y1="90" x2="242" y2="90" stroke="#8a94a0" stroke-width="2" marker-end="url(#arC)"/>
  <line x1="434" y1="90" x2="472" y2="90" stroke="#8a94a0" stroke-width="2" marker-end="url(#arC)"/>

  <!-- two results branch -->
  <line x1="654" y1="80" x2="704" y2="66" stroke="#8a94a0" stroke-width="2" marker-end="url(#arC)"/>
  <line x1="654" y1="100" x2="704" y2="128" stroke="#8a94a0" stroke-width="2" marker-end="url(#arC)"/>
  <rect x="708" y="40" width="176" height="46" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="1.8"/>
  <text x="796" y="59" text-anchor="middle" font-size="11.5" fill="#9a6700">링크 단계 →</text>
  <text x="796" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#9a6700">live binding</text>
  <rect x="708" y="108" width="176" height="46" rx="9" fill="#fff8e6" stroke="#e0a800" stroke-width="1.8"/>
  <text x="796" y="127" text-anchor="middle" font-size="11.5" fill="#9a6700">파싱 그래프 →</text>
  <text x="796" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#9a6700">tree-shaking</text>

  <text x="24" y="152" font-size="12" font-weight="700" fill="#2e7d32">= 결과(부산물)는 정적 설계에서 따라온다</text>

  <!-- divider -->
  <line x1="24" y1="188" x2="876" y2="188" stroke="#d7dde3" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- bottom: CJS contrast -->
  <text x="450" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#7a8590">대조 — CommonJS</text>
  <rect x="120" y="234" width="180" height="56" rx="10" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.8"/>
  <text x="210" y="259" text-anchor="middle" font-size="12.5" font-weight="700" fill="#33414d">동기 (디스크 즉시)</text>
  <text x="210" y="278" text-anchor="middle" font-size="11" fill="#7a8590">그런 압박 없음</text>
  <rect x="360" y="234" width="180" height="56" rx="10" fill="#f2f4f6" stroke="#9aa4ad" stroke-width="1.8"/>
  <text x="450" y="266" text-anchor="middle" font-size="12.5" font-weight="700" fill="#33414d">동적이어도 OK</text>
  <rect x="600" y="234" width="200" height="56" rx="10" fill="#fdecea" stroke="#d64545" stroke-width="1.8"/>
  <text x="700" y="259" text-anchor="middle" font-size="12" font-weight="700" fill="#a02020">링크 없음</text>
  <text x="700" y="278" text-anchor="middle" font-size="11.5" fill="#a02020">→ live binding 없음</text>
  <line x1="300" y1="262" x2="358" y2="262" stroke="#8a94a0" stroke-width="2" marker-end="url(#arC)"/>
  <line x1="540" y1="262" x2="598" y2="262" stroke="#8a94a0" stroke-width="2" marker-end="url(#arC)"/>

  <text x="450" y="330" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">동기/비동기 = 동기(motivation) · 정적/동적 = 메커니즘 · live binding = 결과</text>
</svg>
