<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="system-ui, -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <marker id="arG" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#8a94a0"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#ffffff"/>
  <text x="440" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#33414d">"이 파일은 모듈인가?" — 누가 정하나</text>

  <!-- question -->
  <rect x="345" y="56" width="190" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="440" y="79" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">모듈 vs 스크립트?</text>
  <text x="440" y="98" text-anchor="middle" font-size="11" fill="#6366f1">= 스코프가 갈린다</text>

  <!-- branches -->
  <line x1="400" y1="108" x2="160" y2="168" stroke="#8a94a0" stroke-width="1.8" marker-end="url(#arG)"/>
  <line x1="440" y1="108" x2="440" y2="168" stroke="#8a94a0" stroke-width="1.8" marker-end="url(#arG)"/>
  <line x1="480" y1="108" x2="720" y2="168" stroke="#8a94a0" stroke-width="1.8" marker-end="url(#arG)"/>

  <!-- browser -->
  <rect x="30" y="172" width="245" height="150" rx="10" fill="#e3f0ff" stroke="#1565c0" stroke-width="2"/>
  <text x="152" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#0d3c75">브라우저 (호스트=HTML)</text>
  <text x="152" y="222" text-anchor="middle" font-size="12" font-family="monospace" fill="#0d3c75">&lt;script type="module"&gt;</text>
  <text x="152" y="246" text-anchor="middle" font-size="11.5" fill="#1565c0">= 로드 방식이 결정</text>
  <text x="152" y="278" text-anchor="middle" font-size="11" fill="#5f6b76">콘텐츠로 승격 안 됨.</text>
  <text x="152" y="296" text-anchor="middle" font-size="11" fill="#5f6b76">classic 에 import → SyntaxError</text>

  <!-- node -->
  <rect x="300" y="172" width="280" height="150" rx="10" fill="#eef7ee" stroke="#2e7d32" stroke-width="2"/>
  <text x="440" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Node (호스트=로더)</text>
  <text x="440" y="222" text-anchor="middle" font-size="12" font-family="monospace" fill="#166534">.mjs / .cjs 확장자</text>
  <text x="440" y="244" text-anchor="middle" font-size="12" font-family="monospace" fill="#166534">package.json "type"</text>
  <text x="440" y="268" text-anchor="middle" font-size="11.5" fill="#2e7d32">= 확장자·설정이 결정</text>
  <text x="440" y="298" text-anchor="middle" font-size="11" fill="#5f6b76">콘텐츠 감지는 애매한 .js fallback 뿐</text>

  <!-- ts -->
  <rect x="605" y="172" width="245" height="150" rx="10" fill="#fff8e6" stroke="#e0a800" stroke-width="2"/>
  <text x="727" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#9a6700">TS · 번들러 (정적 도구)</text>
  <text x="727" y="222" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#9a6700">import / export</text>
  <text x="727" y="242" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#9a6700">import.meta</text>
  <text x="727" y="266" text-anchor="middle" font-size="11.5" fill="#9a6700">= 콘텐츠가 결정 (정적 근사)</text>
  <text x="727" y="296" text-anchor="middle" font-size="11" fill="#5f6b76">런타임 전에 스코프를 정해야 하니까</text>

  <text x="440" y="366" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">실행 환경(호스트)이 진실을 정하고, 정적 도구는 그것을 근사한다 — "어디서 실행?"이 첫 질문</text>
</svg>
