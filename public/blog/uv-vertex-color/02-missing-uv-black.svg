<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="760" height="300" fill="#fafafa"/>
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">UV가 없으면 왜 "검정"이 되나</text>

  <!-- Stage A: mesh + texture, no UV -->
  <rect x="24" y="74" width="190" height="170" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <polygon points="119,108 70,196 168,196" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="119" y="222" text-anchor="middle" font-size="12.5" fill="#374151">UV 없는 메시</text>
  <text x="119" y="240" text-anchor="middle" font-size="12.5" fill="#374151">+ 텍스처 강제 부착</text>

  <!-- arrow -->
  <path d="M 222 159 L 270 159" stroke="#6b7280" stroke-width="1.8"/>
  <polygon points="270,159 260,154 260,164" fill="#6b7280"/>
  <text x="246" y="146" text-anchor="middle" font-size="10.5" fill="#dc2626">좌표=(0,0)</text>

  <!-- Stage B: atlas with black corners -->
  <rect x="284" y="74" width="190" height="170" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="379" y="100" text-anchor="middle" font-size="12.5" fill="#6b7280">텍스처 = 아틀라스</text>
  <g transform="translate(319,110)">
    <rect width="120" height="100" fill="#111827"/>
    <rect x="22" y="18" width="76" height="64" fill="#fbbf24"/>
    <circle cx="52" cy="50" r="16" fill="#f472b6"/>
    <!-- (0,0) marker bottom-left, black -->
    <circle cx="0" cy="100" r="7" fill="#dc2626" stroke="#fff" stroke-width="2"/>
    <text x="6" y="120" font-size="10.5" fill="#dc2626">(0,0)=빈 모서리(검정)</text>
  </g>

  <!-- arrow -->
  <path d="M 482 159 L 530 159" stroke="#6b7280" stroke-width="1.8"/>
  <polygon points="530,159 520,154 520,164" fill="#6b7280"/>
  <text x="506" y="146" text-anchor="middle" font-size="10.5" fill="#374151">그 점만 샘플</text>

  <!-- Stage C: all black mesh -->
  <rect x="544" y="74" width="190" height="170" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <polygon points="639,108 590,196 688,196" fill="#111827" stroke="#374151"/>
  <text x="639" y="222" text-anchor="middle" font-size="12.5" font-weight="700" fill="#dc2626">메시 전체가 검정</text>
  <text x="639" y="240" text-anchor="middle" font-size="11.5" fill="#6b7280">증상은 같아도 원인은 UV 부재</text>
</svg>
