<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="760" height="360" fill="#fafafa"/>
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">"뷰어에선 보이는데 export는 왜 다르지?"</text>
  <text x="380" y="56" text-anchor="middle" font-size="12.5" fill="#6b7280">같은 three.js라도 — 한쪽은 파서, 한쪽은 렌더러일 뿐</text>

  <!-- Row 1: external viewer -->
  <text x="40" y="100" font-size="14" font-weight="700" fill="#dc2626">외부 뷰어 (파일을 직접 파싱)</text>
  <rect x="40" y="112" width="170" height="64" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="125" y="138" text-anchor="middle" font-size="12" fill="#374151">PLY 파일</text>
  <text x="125" y="158" text-anchor="middle" font-size="11" fill="#9ca3af">comment TextureFile</text>
  <path d="M 214 144 L 268 144" stroke="#6b7280" stroke-width="1.8"/>
  <polygon points="268,144 258,139 258,149" fill="#6b7280"/>
  <text x="241" y="132" text-anchor="middle" font-size="10" fill="#6b7280">파서</text>
  <rect x="272" y="112" width="190" height="64" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="367" y="138" text-anchor="middle" font-size="12" fill="#9a3412">비표준 주석 무시</text>
  <text x="367" y="158" text-anchor="middle" font-size="11" fill="#9a3412">짝지을 정보 없음</text>
  <path d="M 466 144 L 520 144" stroke="#6b7280" stroke-width="1.8"/>
  <polygon points="520,144 510,139 510,149" fill="#6b7280"/>
  <rect x="524" y="112" width="170" height="64" rx="10" fill="#ffffff" stroke="#9ca3af"/>
  <text x="609" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#9ca3af">흰색 ✗</text>

  <line x1="40" y1="200" x2="720" y2="200" stroke="#e5e7eb"/>

  <!-- Row 2: our viewer -->
  <text x="40" y="234" font-size="14" font-weight="700" fill="#16a34a">자체 뷰어 (파일을 파싱하지 않음)</text>
  <rect x="40" y="246" width="190" height="78" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="135" y="270" text-anchor="middle" font-size="12" fill="#374151">서버가 별도로 내려줌</text>
  <text x="135" y="290" text-anchor="middle" font-size="11" fill="#6b7280">메시 파일 / 텍스처 파일</text>
  <text x="135" y="308" text-anchor="middle" font-size="11" fill="#2563eb">데이터 모델이 둘을 짝지음</text>
  <path d="M 234 285 L 288 285" stroke="#6b7280" stroke-width="1.8"/>
  <polygon points="288,285 278,280 278,290" fill="#6b7280"/>
  <text x="261" y="273" text-anchor="middle" font-size="10" fill="#6b7280">렌더러</text>
  <rect x="292" y="246" width="190" height="78" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="387" y="280" text-anchor="middle" font-size="12" fill="#1e40af">three.js는 그리기만</text>
  <text x="387" y="300" text-anchor="middle" font-size="11" fill="#1e40af">material.map에 꽂음</text>
  <path d="M 486 285 L 540 285" stroke="#6b7280" stroke-width="1.8"/>
  <polygon points="540,285 530,280 530,290" fill="#6b7280"/>
  <rect x="544" y="246" width="170" height="78" rx="10" fill="#ffffff" stroke="#86efac"/>
  <text x="629" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">정상 ✓</text>

  <text x="380" y="350" text-anchor="middle" font-size="12" fill="#374151">→ "뷰어에서 보임"이 "export 파일에 텍스처 보존됨"을 증명하지 못한다</text>
</svg>
