name: Deploy to GitHub Pages

on:
  # main 브랜치에 push 될 때 배포한다.
  push:
    branches: [main]
  # Actions 탭에서 수동 실행도 가능하게 한다.
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번의 배포만 진행하고, 진행 중인 실행은 취소하지 않는다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
